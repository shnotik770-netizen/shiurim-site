<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>שיעורים יומיים</title>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;500;600;700&family=David+Libre:wght@400;500;700&family=Noto+Serif+Hebrew:wght@400;600;700&display=swap" rel="stylesheet" />
<style>
  /* Deliberately a different palette/typography/layout language than tefila-times.html
     (navy+brass on a light parchment page, David Libre serif, no dark banner or star
     ornaments) so the two screens read as distinct at a glance, not reskins of each other. */
  :root {
    --navy: #1e3a5f;
    --navy-deep: #142944;
    --gold: #b8862e;
    --gold-light: #d4a94f;
    --cream: #fdf8ec;
    --parchment: #f4e8c8;
    --parchment-2: #ecdcae;
    --ink: #1e3a5f;
    --ink-mid: #3f5b7d;
    --shadow: rgba(30,58,95,0.14);
    --r: 16px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Assistant', 'David Libre', serif;
    background: var(--cream);
    color: var(--ink);
    height: 100dvh;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 55% 40% at 15% 10%, rgba(184,134,46,0.09) 0%, transparent 60%),
      radial-gradient(ellipse 50% 55% at 85% 90%, rgba(30,58,95,0.06) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }

  /* ═══ POSTER ═══ */
  .poster {
    position: relative; z-index: 1;
    height: 100dvh;
    display: grid;
    grid-template-rows: auto 1fr;
  }

  /* ═══ HEADER ═══ - light parchment banner (not a dark bar), navy text */
  .site-header {
    background: linear-gradient(180deg, var(--parchment) 0%, var(--cream) 100%);
    border-bottom: 3px double var(--gold);
    padding: clamp(8px,1.3vh,16px) 2rem;
    text-align: center;
  }
  .site-header h1 {
    font-family: 'David Libre', serif;
    font-weight: 700; color: var(--navy);
    font-size: clamp(20px, 3vw, 38px);
    letter-spacing: .03em;
  }
  .header-sub {
    color: var(--ink-mid);
    font-family: 'Assistant', sans-serif;
    font-size: clamp(12px, 1.3vw, 16px);
    font-weight: 600; margin-top: 4px;
    letter-spacing: .03em;
  }

  /* ═══ MAIN / GRID ═══ */
  main {
    padding: clamp(7px,1.1vh,18px) clamp(7px,1.2vw,20px);
    overflow: hidden;
    display: flex; flex-direction: column;
  }

  .grid-wrapper {
    flex: 1; min-height: 0;
    display: grid;
    gap: clamp(7px, 1vw, 16px);
    grid-template-columns: repeat(3, 1fr);
    /* Top two rows sized to a small fixed share, Hayom Yom's row takes everything left
       over - it's routinely the longest text of the page and deserves the room. */
    grid-template-rows: minmax(0,.62fr) minmax(0,.62fr) 1.76fr;
    grid-template-areas:
      "chumash tehillim tanya"
      "r3      r1        mitzvos"
      "hayom   hayom     hayom";
  }
  #card-chumash  { grid-area: chumash; }
  #card-tehillim { grid-area: tehillim; }
  #card-tanya    { grid-area: tanya; }
  #card-r3       { grid-area: r3; }
  #card-r1       { grid-area: r1; }
  #card-mitzvos  { grid-area: mitzvos; }
  #card-hayom    { grid-area: hayom; }

  /* ═══ COLUMN CARD ═══ - single flat parchment surface, no contrasting header bar */
  .column {
    background: linear-gradient(170deg, var(--cream) 0%, var(--parchment) 100%);
    border-radius: var(--r);
    border: 1.5px solid rgba(184,134,46,0.4);
    box-shadow: 0 3px 12px var(--shadow);
    display: flex; flex-direction: column;
    overflow: hidden;
    min-height: 0;
    padding: clamp(6px,1vh,12px) clamp(9px,1.1vw,16px);
  }

  /* Quiet label: small, medium-weight, underlined with a thin gold rule - the lesson
     text below it is what's meant to draw the eye. */
  .col-title {
    font-family: 'Assistant', sans-serif;
    font-weight: 600; color: var(--navy);
    font-size: clamp(11px, 1.15vw, 15px);
    letter-spacing: .05em;
    text-align: center;
    padding-bottom: clamp(4px,.6vh,8px);
    margin-bottom: clamp(4px,.6vh,8px);
    border-bottom: 1.5px solid rgba(184,134,46,0.45);
    flex-shrink: 0;
  }

  .col-body {
    flex: 1; min-height: 0;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }

  /* The lesson content itself is the bold, dominant element in each card. */
  .lesson-text {
    font-family: 'David Libre', 'Noto Serif Hebrew', serif;
    font-weight: 700;
    font-size: clamp(15px, 1.85vw, 24px);
    color: var(--ink);
    text-align: center;
    white-space: pre-wrap;
    line-height: 1.45;
  }
  .lesson-text:empty::before {
    content: '—';
    font-weight: 400;
    color: rgba(30,58,95,.3);
  }
  /* Sefer HaMitzvot is deliberately left visually blank (not "—") when unavailable/stale */
  #mitzvos:empty::before { content: ''; }

  /* Hayom Yom: gets its own much larger row (see grid-template-rows above), centered
     rather than the small corner treatment it used to get, with room to breathe before
     the internal scroll (still in enableAutoScroll below) ever needs to kick in. */
  #card-hayom { padding: clamp(10px,1.5vh,18px) clamp(14px,1.6vw,26px); }
  #card-hayom .col-title { font-size: clamp(13px, 1.4vw, 18px); }
  #card-hayom .col-body { align-items: flex-start; }
  #card-hayom .lesson-text {
    text-align: center;
    line-height: 1.7;
    font-size: clamp(19px, 2.5vw, 32px);
    height: 100%;
    width: 100%;
    overflow-y: auto;
    scroll-behavior: smooth;
  }
  #card-hayom .lesson-text::-webkit-scrollbar { width: 0; height: 0; }
  #card-hayom .lesson-text { scrollbar-width: none; }

  @media (max-width: 900px) {
    .grid-wrapper {
      grid-template-columns: 1fr;
      grid-template-rows: none;
      grid-template-areas:
        "chumash" "tehillim" "tanya"
        "r3" "r1" "mitzvos"
        "hayom";
      overflow-y: auto;
    }
    #card-hayom .lesson-text { height: auto; max-height: clamp(150px, 32vh, 42vh); }
  }

  @media print {
    .poster { height: auto; }
    .site-header { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>
</head>
<body>

<div class="poster">
  <header class="site-header">
    <h1>שיעורים יומיים</h1>
    <div class="header-sub" id="date">טוען…</div>
  </header>

  <main>
    <div class="grid-wrapper" id="grid">
      <section class="column" id="card-chumash">
        <h2 class="col-title">חומש עם רש״י</h2>
        <div class="col-body"><div class="lesson-text" id="chumash"></div></div>
      </section>
      <section class="column" id="card-tehillim">
        <h2 class="col-title">תהילים</h2>
        <div class="col-body"><div class="lesson-text" id="tehillim"></div></div>
      </section>
      <section class="column" id="card-tanya">
        <h2 class="col-title">תניא</h2>
        <div class="col-body"><div class="lesson-text" id="tanya"></div></div>
      </section>
      <section class="column" id="card-r3">
        <h2 class="col-title">רמב״ם — 3 פרקים</h2>
        <div class="col-body"><div class="lesson-text" id="r3"></div></div>
      </section>
      <section class="column" id="card-r1">
        <h2 class="col-title">רמב״ם — פרק 1</h2>
        <div class="col-body"><div class="lesson-text" id="r1"></div></div>
      </section>
      <section class="column" id="card-mitzvos">
        <h2 class="col-title">ספר המצוות</h2>
        <div class="col-body"><div class="lesson-text" id="mitzvos"></div></div>
      </section>
      <section class="column" id="card-hayom">
        <h2 class="col-title">היום יום</h2>
        <div class="col-body"><div class="lesson-text" id="hayom"></div></div>
      </section>
    </div>
  </main>
</div>

<script>
/* === כתובת ה-GViz === */
const SHEET_GVIZ =
  "https://docs.google.com/spreadsheets/d/1utQ6ndVedwFHoSua02o0w8sGUrsH5ztNL_EzfcqiiK8/gviz/tq?tqx=out:json&gid=2146538857";

/* --- מטמון לשעה לכל הדף --- */
const CACHE_KEY = "daily_lessons_payload_v1";
const HOUR_MS   = 60 * 60 * 1000;

function loadFromCache(){
  try{
    const raw = localStorage.getItem(CACHE_KEY);
    if(!raw) return null;
    const obj = JSON.parse(raw);
    if(!obj || !obj.timestamp || (Date.now() - obj.timestamp) >= HOUR_MS) return null;
    return obj.payload || null;
  }catch{ return null; }
}
function saveToCache(payload){
  try{
    localStorage.setItem(CACHE_KEY, JSON.stringify({ timestamp: Date.now(), payload }));
  }catch{}
}

/* --- טעינת GViz כ-<script> (עוקף CORS) --- */
function loadGvizTable(url){
  return new Promise((resolve, reject) => {
    const tsUrl = url + "&t=" + Date.now();
    const prev = (window.google && window.google.visualization &&
                  window.google.visualization.Query &&
                  window.google.visualization.Query.setResponse)
                 ? window.google.visualization.Query.setResponse : null;
    window.google = window.google || {};
    window.google.visualization = window.google.visualization || {};
    window.google.visualization.Query = window.google.visualization.Query || {};
    window.google.visualization.Query.setResponse = (resp) => {
      try{
        if (!resp || resp.status !== 'ok') { reject(new Error('GViz response error')); return; }
        resolve(resp.table);
      } finally { if (prev) window.google.visualization.Query.setResponse = prev; script.remove(); }
    };
    const script = document.createElement('script');
    script.src = tsUrl;
    script.onerror = () => { if (prev) window.google.visualization.Query.setResponse = prev;
      reject(new Error('GViz script load error')); };
    document.body.appendChild(script);
  });
}

/* --- עזרי טבלה/תאריכים --- */
function cellValue(c){ if(!c) return ""; if(c.f!=null) return c.f; if(c.v==null) return "";
  if(typeof c.v==="string" && /^Date\(/.test(c.v)){ const m=c.v.match(/^Date\((\d+),(\d+),(\d+)/);
    if(m) return new Date(+m[1],+m[2],+m[3]); } return c.v; }
function rowToObj(cols,row){ const o={}; cols.forEach((c,i)=>{ const k=c.label||`col_${i}`; o[k]=cellValue(row.c[i]); }); return o; }
function keyYMD(d,tz='Asia/Jerusalem'){ const p=new Intl.DateTimeFormat('en-CA',{timeZone:tz,year:'numeric',month:'2-digit',day:'2-digit'}).formatToParts(d).reduce((a,p)=>(a[p.type]=p.value,a),{}); return `${p.year}-${p.month}-${p.day}`; }
function normalizeDateString(s){ if(s==null) return null;
  if(Object.prototype.toString.call(s)==='[object Date]'&&!isNaN(s)) return s;
  const clean=String(s).replace(/[‎‏]/g,'').trim();
  let m=clean.match(/^(\d{1,2})[./\-](\d{1,2})[./\-](\d{4})$/); if(m) return new Date(+m[3],+m[2]-1,+m[1]);
  m=clean.match(/^(\d{4})[./\-](\d{1,2})[./\-](\d{1,2})$/); if(m) return new Date(+m[1],+m[2]-1,+m[3]);
  const t=Date.parse(clean); if(!isNaN(t)) return new Date(t); return null; }
function formatGreg(v){ if(v instanceof Date){ return new Intl.DateTimeFormat('he-IL',{timeZone:'Asia/Jerusalem',year:'numeric',month:'2-digit',day:'2-digit'}).format(v);} return String((v??"")).replace(/[‎‏]/g,'').trim(); }

/* מיפוי כותרות סלחני (כולל "יום") */
function normLabel(s){ return String(s||"").replace(/[‎‏]/g,'').replace(/[\"׳״']/g,'').replace(/רש\s*י/g,'רשי').replace(/[–—\-]/g,' ').replace(/\s+/g,' ').trim().toLowerCase(); }
const TARGETS={ day:["יום","יום בשבוע"], heb:["תאריך עברי"], greg:["תאריך לועזי"], chumash:["חומש עם רשי"], tehillim:["תהילים","תהלים"], tanya:["תניא"], rambam3:["רמבם 3 פרקים","רמבם 3 פרק"], rambam1:["רמבם פרק 1","רמבם פרק אחד","רמבם 1 פרק"], mitzvos:["ספר המצוות"], hayom:["היום יום"] };
function buildLabelMap(cols){ const m=new Map(); for(const c of cols){ const n=normLabel(c.label); if(!m.has(n)) m.set(n,c.label);} return m; }
function resolveColumnKeys(cols){ const map=buildLabelMap(cols); const out={}; for(const [k,vars] of Object.entries(TARGETS)){ let f=null; for(const v of vars){ const n=normLabel(v); if(map.has(n)){ f=map.get(n); break; } } if(!f){ for(const [n,orig] of map.entries()){ if(vars.some(v=>n.includes(normLabel(v)))){ f=orig; break; } } } out[k]=f; } return out; }

/* שליפה/בנייה */
async function fetchRowsAndCols(){ const table=await loadGvizTable(SHEET_GVIZ); return { rows:(table.rows||[]).map(r=>rowToObj(table.cols,r)), colKeys:resolveColumnKeys(table.cols) }; }
function pickTodayRow(rows,col){ const tz='Asia/Jerusalem', todayKey=keyYMD(new Date(),tz); let best=null,bestAbs=Infinity;
  for(const r of rows){ const gk=col.greg; if(!gk) continue; const d=normalizeDateString(r[gk]); if(!d||isNaN(d)) continue;
    const k=keyYMD(d,tz); if(k===todayKey) return r; const dif=Math.abs((new Date(k)-new Date(todayKey))/86400000); if(dif<bestAbs){bestAbs=dif;best=r;} }
  return best; }

/* ===================================================================
 * Sefaria + chabad RSS data layer (replaces the sheet as the source for
 * everything except Hayom Yom, and the optional second Tehillim line).
 * Same logic already tested end-to-end in dailystudy-table.html.
 * =================================================================== */
const SEFARIA_CALENDARS_URL = 'https://www.sefaria.org/api/calendars';
const DAILYSTUDY_RSS_URL = 'https://he.chabad.org/tools/rss/dailystudy_rss.xml';

// Deploy google-apps-script/chabad-rss-proxy.gs and paste its /exec URL here to try it
// first - Google's own servers may have a different bot-protection reputation than
// Cloudflare Workers or free public proxies. Left empty, skips straight to the public
// proxies below.
const APPS_SCRIPT_PROXY_URL = 'https://script.google.com/macros/s/AKfycbz3wnB2VY7KfFlE_b75Gw8T_gpHPyGLR5_xtNETcc6nN74Rywh2bn2tljewDqRrzfk_/exec';

function sleep(ms){ return new Promise((resolve) => setTimeout(resolve, ms)); }

// Every proxy here (Apps Script, allorigins.win, corsproxy.io) and chabad.org's own bot
// protection are outside our control and fail intermittently rather than consistently -
// retrying each one, then falling through to the next, smooths over transient blips
// without pretending any single one is fully reliable.
async function fetchWithRetry(url, options, attempts=3, delayMs=1200){
  let lastError;
  for(let i=0; i<attempts; i++){
    try{
      const res = await fetch(url, options);
      if(!res.ok) throw new Error('HTTP '+res.status);
      return res;
    }catch(e){
      lastError = e;
      if(i < attempts-1) await sleep(delayMs);
    }
  }
  throw lastError;
}

// Tries each proxy in turn (2 attempts each, so a full pass across all three still stays
// reasonably quick) and returns the target URL's raw text from whichever one succeeds first.
async function fetchViaProxyChain(targetUrl){
  const attempts = [];
  if(APPS_SCRIPT_PROXY_URL){
    attempts.push({ name:'Apps Script', url: APPS_SCRIPT_PROXY_URL + '?url=' + encodeURIComponent(targetUrl), extract: (res) => res.text() });
  }
  attempts.push({ name:'allorigins.win', url: 'https://api.allorigins.win/get?url=' + encodeURIComponent(targetUrl), extract: async (res) => (await res.json()).contents });
  attempts.push({ name:'corsproxy.io', url: 'https://corsproxy.io/?' + encodeURIComponent(targetUrl), extract: (res) => res.text() });

  let lastError;
  for(const attempt of attempts){
    try{
      const res = await fetchWithRetry(attempt.url, { cache: 'no-store' }, 2, 1000);
      const text = await attempt.extract(res);
      console.info(`[proxy chain] succeeded via ${attempt.name} for ${targetUrl}`);
      return text;
    }catch(e){
      lastError = e;
      console.warn(`[proxy chain] ${attempt.name} failed:`, e.message);
    }
  }
  throw lastError || new Error('All proxy attempts failed');
}

const TEHILLIM_TABLE = {
  1:[1,9],2:[10,17],3:[18,22],4:[23,28],5:[29,34],6:[35,38],7:[39,43],8:[44,48],9:[49,54],10:[55,59],
  11:[60,65],12:[66,68],13:[69,71],14:[72,76],15:[77,78],16:[79,82],17:[83,87],18:[88,89],19:[90,96],20:[97,103],
  21:[104,105],22:[106,107],23:[108,112],24:[113,118],27:[120,134],28:[135,139],29:[140,144],30:[145,150],
};
const TANYA_SECTION_HE = {
  'Likutei Amarim':'ליקוטי אמרים', 'Likkutei Amarim':'ליקוטי אמרים', "Sha'ar HaYichud VehaEmunah":'שער היחוד והאמונה',
  'Iggeret HaTeshuvah':'אגרת התשובה', 'Iggeret HaKodesh':'אגרת הקודש', 'Kuntres Acharon':'קונטרס אחרון',
};
const BOOK_HE = { Genesis:'בראשית', Exodus:'שמות', Leviticus:'ויקרא', Numbers:'במדבר', Deuteronomy:'דברים' };

function toHebrewNumeral(num){
  let n = Math.round(num);
  if (!Number.isFinite(n) || n <= 0) return String(num);
  const HUNDREDS=['','ק','ר','ש','ת'], TENS=['','י','כ','ל','מ','נ','ס','ע','פ','צ'], ONES=['','א','ב','ג','ד','ה','ו','ז','ח','ט'];
  let letters='';
  while(n>=400){ letters+='ת'; n-=400; }
  if(n>=100){ letters+=HUNDREDS[Math.floor(n/100)]; n%=100; }
  if(n===15){ letters+='טו'; n=0; } else if(n===16){ letters+='טז'; n=0; }
  else { letters += TENS[Math.floor(n/10)] + ONES[n%10]; }
  if(!letters.length) return '';
  if(letters.length===1) return letters+'׳';
  return letters.slice(0,-1)+'״'+letters.slice(-1);
}

function findCalItem(items, titleEn){ return items.find(i=>i.title && i.title.en===titleEn); }
function findCalItems(items, titleEn){ return items.filter(i=>i.title && i.title.en===titleEn); }

function formatVerseRefHebrew(ref){
  const m = ref && ref.match(/^([A-Za-z]+)\s+(\d+):(\d+)-(\d+):(\d+)$/);
  if(!m) return ref;
  const [, book, c1, v1, c2, v2] = m;
  const bookHe = BOOK_HE[book] || book;
  const c1he=toHebrewNumeral(+c1), v1he=toHebrewNumeral(+v1), v2he=toHebrewNumeral(+v2);
  if(c1===c2) return `${bookHe}, פרק ${c1he} פסוק ${v1he} עד פסוק ${v2he}`;
  return `${bookHe}, פרק ${c1he} פסוק ${v1he} עד פרק ${toHebrewNumeral(+c2)} פסוק ${v2he}`;
}

function formatTehillimRangeHebrew(hebrewDay){
  if(hebrewDay===25) return 'תהלים קי״ט (חלק א׳, אות א׳-ל׳)';
  if(hebrewDay===26) return 'תהלים קי״ט (חלק ב׳, אות ל׳-ת׳)';
  const range = TEHILLIM_TABLE[hebrewDay];
  if(!range) return null;
  const [start,end] = range;
  if(start===end) return `פרק ${toHebrewNumeral(start)}`;
  return `פרק ${toHebrewNumeral(start)} עד פרק ${toHebrewNumeral(end)}`;
}

function parseTanyaRef(ref){
  const m = ref && ref.match(/;\s*(.+?)\s+(\d+):(\d+)$/);
  return m ? { section:m[1].trim(), chapter:+m[2], segment:+m[3] } : null;
}

async function fetchSefariaCalendar(date){
  // diaspora=0 -> Israel reading schedule.
  const url = `${SEFARIA_CALENDARS_URL}?year=${date.getFullYear()}&month=${date.getMonth()+1}&day=${date.getDate()}&diaspora=0`;
  const res = await fetch(url, { cache:'no-store' });
  if(!res.ok) throw new Error('Sefaria HTTP '+res.status);
  return res.json();
}

function toTdate(date){ return `${date.getMonth()+1}/${date.getDate()}/${date.getFullYear()}`; }
function addDays(date, delta){ const d=new Date(date); d.setDate(d.getDate()+delta); return d; }

function stripHtml(s){ return (s||'').replace(/<[^>]*>/g,' ').replace(/\s+/g,' ').trim(); }
function firstLastWords(text, n){
  const words = stripHtml(text).split(' ').filter(Boolean);
  if(!words.length) return null;
  return { first: words.slice(0,n).join(' '), last: words.slice(-n).join(' ') };
}
async function fetchTanyaText(url){
  const res = await fetch(`https://www.sefaria.org/api/texts/${url}?lang=he&context=0`, { cache:'no-store' });
  if(!res.ok) throw new Error('Sefaria texts HTTP '+res.status);
  const data = await res.json();
  return Array.isArray(data.he) ? data.he : [data.he];
}

/* ---- per-track builders (all operate on an already-fetched calendar) ---- */

function buildChumashText(cal, date){
  const items = cal.calendar_items || [];
  const parasha = findCalItem(items, 'Parashat Hashavua');
  const aliyot = parasha && parasha.extraDetails && parasha.extraDetails.aliyot;
  const aliyah = aliyot && aliyot[date.getDay()];
  if(!parasha || !aliyah) return null;
  return `פרשת ${parasha.displayValue.he}\n${formatVerseRefHebrew(aliyah)}`;
}

function buildTehillimSefariaText(cal){
  const items = cal.calendar_items || [];
  const tanyaItem = findCalItem(items, 'Tanya Yomi');
  const m = tanyaItem && tanyaItem.displayValue.en.match(/^(\d+)/);
  const hebDay = m ? +m[1] : null;
  return hebDay ? formatTehillimRangeHebrew(hebDay) : null;
}

function buildRambamTexts(cal){
  const items = cal.calendar_items || [];
  const rambam1 = findCalItem(items, 'Daily Rambam');
  const rambam3 = findCalItems(items, 'Daily Rambam (3 Chapters)');
  return {
    r1: rambam1 ? rambam1.displayValue.he : null,
    r3: rambam3.length ? rambam3.map(i=>i.displayValue.he).join(', ') : null,
  };
}

// Tomorrow's Tanya ref marks exactly where today's reading has to stop (Sefaria's calendar
// API only gives a starting point, never an end) - fetch [today, tomorrow) as a range and
// drop the last (tomorrow's) segment to get the real daily boundary.
async function buildTanyaText(cal, date){
  const items = cal.calendar_items || [];
  const tanyaItem = findCalItem(items, 'Tanya Yomi');
  if(!tanyaItem) return null;
  const parsed = parseTanyaRef(tanyaItem.ref);
  const header = parsed ? `${TANYA_SECTION_HE[parsed.section] || parsed.section}, פרק ${toHebrewNumeral(parsed.chapter)}` : tanyaItem.ref;

  let snippet = null;
  try{
    const tomorrowCal = await fetchSefariaCalendar(addDays(date, 1));
    const tomorrowItem = findCalItem(tomorrowCal.calendar_items || [], 'Tanya Yomi');
    const tomorrowParsed = tomorrowItem && parseTanyaRef(tomorrowItem.ref);

    let heSegments;
    if(parsed && tomorrowParsed && parsed.section===tomorrowParsed.section){
      const rangeUrl = `${tanyaItem.url}-${tomorrowParsed.chapter}.${tomorrowParsed.segment}`;
      heSegments = await fetchTanyaText(rangeUrl);
      if(heSegments.length>1) heSegments = heSegments.slice(0,-1);
    } else {
      heSegments = await fetchTanyaText(tanyaItem.url);
    }
    const words = firstLastWords(heSegments.flat(Infinity).join(' '), 2);
    if(words) snippet = `'${words.first}' עד '${words.last}'`;
  }catch(e){ console.warn('Tanya snippet fetch failed:', e.message); }

  return snippet ? `${header}\n${snippet}` : header;
}

// ספר המצוות: not in Sefaria's calendar at all - only source is chabad's RSS feed, and
// that feed runs on New York time so from roughly midnight to 7am Israel time it still
// shows the previous Israeli day. Each item's own <link> embeds the tdate it's really for,
// so this only returns text when that tdate matches the requested date - otherwise null
// (left blank on screen, per instructions, rather than showing stale content).
async function fetchMitzvosText(date){
  try{
    const xmlText = await fetchViaProxyChain(DAILYSTUDY_RSS_URL);
    const doc = new DOMParser().parseFromString(xmlText, 'application/xml');
    if(doc.querySelector('parsererror')) throw new Error('XML לא תקין');
    const item = Array.from(doc.querySelectorAll('item')).find(it=>{
      const link = it.querySelector('link');
      return link && /seferHamitzvos\.asp/.test(link.textContent);
    });
    if(!item){ console.warn('Sefer HaMitzvot: no matching <item> in RSS feed'); return null; }
    const link = item.querySelector('link').textContent.trim();
    const m = link.match(/tdate=(\d+\/\d+\/\d+)/);
    const itemTdate = m ? m[1] : null;
    if(itemTdate !== toTdate(date)){
      console.warn(`Sefer HaMitzvot: feed shows ${itemTdate}, requested ${toTdate(date)} - not rolled over yet (NY-time lag) or a real mismatch`);
      return null;
    }
    const description = (item.querySelector('description')||{}).textContent || '';
    const cleaned = description.replace(/^Today's Lesson:\s*/i,'').trim();
    if(!cleaned) console.warn('Sefer HaMitzvot: item matched but description was empty. Raw description:', JSON.stringify(description));
    return cleaned || null;
  }catch(e){
    console.warn('Sefer HaMitzvot RSS fetch failed:', e.message);
    return null;
  }
}

// Hebcal is the authoritative source for the Hebrew date (including the year, which
// Sefaria's calendar API doesn't expose at all). Falls back to a Gregorian-only label if
// Hebcal is unreachable, rather than leaving the header blank.
async function buildDateText(date){
  const weekday = date.toLocaleDateString('he-IL', { weekday:'long' });
  const greg = date.toLocaleDateString('he-IL', { year:'numeric', month:'long', day:'numeric' });
  try{
    const url = `https://www.hebcal.com/converter?cfg=json&gy=${date.getFullYear()}&gm=${date.getMonth()+1}&gd=${date.getDate()}&g2h=1`;
    const res = await fetchWithRetry(url, { cache:'no-store' });
    const data = await res.json();
    return `${weekday}, ${data.hebrew} · ${greg}`;
  }catch(e){
    console.warn('Hebcal date fetch failed:', e.message);
    return `${weekday}, ${greg}`;
  }
}

/* רינדור למסך מתוך אובייקט payload מוכן */
function renderFromPayload(p){
  document.getElementById('date').textContent = p.dateText || "";
  document.getElementById('chumash').textContent = p.chumash || "—";
  document.getElementById('tehillim').textContent = p.tehillim || "—";
  document.getElementById('tanya').textContent    = p.tanya || "—";
  document.getElementById('r3').textContent       = p.r3 || "—";
  document.getElementById('r1').textContent       = p.r1 || "—";
  // Sefer HaMitzvot is left visually blank (not "—") when unavailable/stale, per instructions.
  document.getElementById('mitzvos').textContent  = p.mitzvos || "";
  document.getElementById('hayom').textContent    = p.hayom || "—";
}

/* בניית payload משולב: Sefaria/RSS לרוב השדות, גיליון Google רק להיום-יום + שורה שנייה לתהילים */
async function buildPayload(date){
  let cal = null;
  try{ cal = await fetchSefariaCalendar(date); }
  catch(e){ console.warn('Sefaria calendar fetch failed:', e.message); }

  let sheetRow = null, colKeys = null;
  try{
    const { rows, colKeys: ck } = await fetchRowsAndCols();
    colKeys = ck;
    sheetRow = pickTodayRow(rows, colKeys);
  }catch(e){ console.warn('Sheet fetch failed:', e.message); }

  const sheetGet = (k) => (sheetRow && k && sheetRow[k]!=null) ? String(sheetRow[k]).trim() : '';

  const tehillimSefaria = cal ? buildTehillimSefariaText(cal) : null;
  const tehillimSheet = colKeys ? sheetGet(colKeys.tehillim) : '';
  const tehillim = [tehillimSefaria, tehillimSheet].filter(Boolean).join('\n') || null;
  const rambam = cal ? buildRambamTexts(cal) : { r1:null, r3:null };

  return {
    dateText: await buildDateText(date),
    chumash:  cal ? buildChumashText(cal, date) : null,
    tehillim,
    tanya:    cal ? await buildTanyaText(cal, date) : null,
    r3:       rambam.r3,
    r1:       rambam.r1,
    mitzvos:  await fetchMitzvosText(date),
    hayom:    colKeys ? (sheetGet(colKeys.hayom) || null) : null,
  };
}

/* הקטנת פונט אוטומטית ל'תוכן שיעור' שלא נכנס בריבוע (חוץ מהיום יום, שגולל ולא מקטין) */
const FIT_TEXT_MIN_PX = 11;
function fitTextToBox(el){
  if(!el) return;
  const container = el.parentElement; // .col-body
  if(!container) return;
  el.style.fontSize = '';
  let size = parseFloat(getComputedStyle(el).fontSize);
  let guard = 200; // safety cap so a layout quirk can never spin this forever
  while(guard-- > 0 && size > FIT_TEXT_MIN_PX &&
        (el.scrollHeight > container.clientHeight || el.scrollWidth > container.clientWidth)){
    size -= 1;
    el.style.fontSize = size + 'px';
  }
}
function fitAllLessonCards(){
  document.querySelectorAll('.column:not(#card-hayom) .lesson-text').forEach(fitTextToBox);
}

/* גלילה רק מטה עם השהיות (ל’היום יום’) */
function enableAutoScroll(selector, delayMs=5000){
  const el = document.querySelector(selector);
  if(!el) return;
  let timer = null;
  function clearTimer(){ if(timer){ clearInterval(timer); timer = null; } }
  function startCycle(){
    if(el.scrollHeight <= el.clientHeight) return;
    const step=1, intervalMs=16;
    timer=setInterval(()=>{
      el.scrollTop=Math.min(el.scrollTop+step,el.scrollHeight-el.clientHeight);
      if(el.scrollTop+el.clientHeight>=el.scrollHeight){
        clearTimer();
        setTimeout(()=>{
          el.scrollTop=0;
          setTimeout(()=>startCycle(),delayMs);
        },delayMs);
      }
    },intervalMs);
  }
  document.addEventListener('visibilitychange',()=>{ if(document.hidden) clearTimer(); });
  setTimeout(()=>startCycle(),delayMs);
}

/* --- התחלה: מטמון לשעה --- */
(async function init(){
  try{
    // 1) נסה מטמון
    const cached = loadFromCache();
    if (cached){
      renderFromPayload(cached);
      await document.fonts.ready; // measure only after the real webfont has swapped in
      fitAllLessonCards();
      enableAutoScroll('#card-hayom .lesson-text',5000);
      return;
    }

    // 2) אין מטמון תקף -> שלוף מ-Sefaria/RSS (+גיליון להיום-יום), רנדר ושמור לשעה
    const payload = await buildPayload(new Date());
    renderFromPayload(payload);
    saveToCache(payload);

    await document.fonts.ready;
    fitAllLessonCards();
    enableAutoScroll('#card-hayom .lesson-text',5000);
  }catch(err){
    console.error(err);
    document.getElementById('date').textContent = "שגיאה בטעינת נתונים";
  }
})();

window.addEventListener('resize', () => fitAllLessonCards());
</script>
