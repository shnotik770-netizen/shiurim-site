<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>זמני תפילות - יום חול</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&family=Frank+Ruhl+Libre:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --crimson: #7a1030;
      --crimson-deep: #4e0a1f;
      --gold: #c8962a;
      --gold-light: #e8b84b;
      --cream: #fdf6e8;
      --parchment: #f5ead0;
      --parchment-2: #ede0c0;
      --ink: #1e1209;
      --ink-mid: #5a3a1a;
      --shadow: rgba(78,10,31,0.18);
      --r: 18px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Heebo', 'Frank Ruhl Libre', serif;
      background: var(--crimson-deep);
      color: var(--ink);
      height: 100dvh;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 20%, rgba(200,150,42,0.10) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 80% 80%, rgba(122,16,48,0.22) 0%, transparent 60%),
        repeating-linear-gradient(45deg, transparent, transparent 40px,
          rgba(255,255,255,0.012) 40px, rgba(255,255,255,0.012) 41px);
      pointer-events: none; z-index: 0;
    }

    /* ═══ SIMULATION PANEL ═══ */
    .sim-panel {
      position: fixed; top: 0; left: 0; right: 0;
      background: rgba(12,2,6,0.96);
      backdrop-filter: blur(10px);
      border-bottom: 2px solid var(--gold);
      padding: 7px 14px;
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      z-index: 1000;
      font-family: 'Heebo', sans-serif;
      font-size: 12px; color: #bbb;
    }
    .sim-badge {
      background: var(--gold); color: var(--ink);
      border-radius: 5px; padding: 2px 8px;
      font-weight: 700; font-size: 11px;
    }
    .sim-group {
      display: flex; align-items: center; gap: 6px;
      border-right: 1px solid rgba(200,150,42,0.25);
      padding-right: 10px; margin-right: 2px;
    }
    .sim-group:last-of-type { border-right: none; }
    .sim-group label { color: #999; white-space: nowrap; }
    .sim-panel input[type="date"],
    .sim-panel input[type="time"] {
      background: #1a0510; border: 1px solid rgba(200,150,42,0.5);
      color: var(--gold-light); padding: 2px 6px; border-radius: 4px;
      font-family: 'Heebo', sans-serif; font-size: 12px; cursor: pointer;
      width: 120px;
    }
    .sim-panel input[type="time"].zman-override { width: 70px; }
    .sim-btn {
      background: var(--crimson); border: 1px solid rgba(200,150,42,0.6);
      color: var(--gold-light); padding: 3px 10px; border-radius: 6px;
      cursor: pointer; font-size: 11px; font-family: 'Heebo', sans-serif;
      font-weight: 700; transition: background .2s; white-space: nowrap;
    }
    .sim-btn:hover { background: #9a1840; }
    .sim-status { margin-right: auto; color: #888; font-size: 11px; }
    .sim-status .ok { color: #5d5; }
    .sim-status .err { color: #d55; }
    .sim-status .loading { color: #aa8; }

    /* ═══ POSTER ═══ */
    .poster {
      position: relative; z-index: 1;
      height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr auto auto;
      padding-top: 38px;
    }

    /* ═══ HEADER ═══ */
    .site-header {
      background: linear-gradient(135deg, var(--crimson-deep) 0%, var(--crimson) 50%, #9a1a40 100%);
      border-bottom: 3px solid var(--gold);
      padding: clamp(6px,1vh,16px) 2rem;
      text-align: center;
      position: relative; overflow: hidden;
    }
    .site-header::before {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(90deg, transparent, transparent 60px,
        rgba(200,150,42,0.055) 60px, rgba(200,150,42,0.055) 61px);
    }
    .site-header h1 {
      font-family: 'Frank Ruhl Libre', serif;
      font-weight: 900; color: #fff;
      font-size: clamp(16px, 3vw, 38px);
      letter-spacing: .04em;
      text-shadow: 0 2px 12px rgba(0,0,0,.5);
      position: relative;
    }
    .header-star { color: var(--gold); opacity: .7; margin: 0 10px; }
    .header-sub {
      color: var(--gold-light);
      font-size: clamp(10px, 1.2vw, 15px);
      font-weight: 400; margin-top: 2px;
      letter-spacing: .06em; opacity: .88;
      position: relative;
    }

    /* ═══ MAIN ═══ */
    main {
      padding: clamp(6px,1vh,16px) clamp(6px,1.2vw,20px);
      overflow: hidden;
      display: flex; flex-direction: column;
    }

    /* ── Normal: 3 equal columns ── */
    .grid-wrapper {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: clamp(7px, 1vw, 18px);
      flex: 1;
      min-height: 0;
      transition: grid-template-columns .55s cubic-bezier(.4,0,.2,1);
    }

    /* ── All spotlight modes: spotlight LEFT 20% + regular cols ── */
    .grid-wrapper.spotlight-mode {
      grid-template-columns: minmax(180px, 20%) repeat(var(--reg-cols, 3), 1fr);
    }

    /* ─── Generic spotlight card ─── */
    .prayer-spotlight {
      display: none;
      border: 3px solid var(--gold);
      border-radius: var(--r);
      box-shadow: 0 0 50px rgba(200,150,42,0.38), inset 0 0 40px rgba(0,0,0,.45);
      align-items: center; justify-content: center;
      text-align: center; flex-direction: column; gap: 8px;
      position: relative; overflow: hidden;
      padding: 12px;
    }
    .prayer-spotlight::before { content:'✦'; position:absolute; top:10px; right:14px; color:var(--gold); opacity:.35; font-size:18px; }
    .prayer-spotlight::after  { content:'✦'; position:absolute; bottom:10px; left:14px; color:var(--gold); opacity:.35; font-size:18px; }

    /* Spotlight visible when parent has spotlight-mode */
    .spotlight-mode .prayer-spotlight { display: flex; }

    /* arvit — dark purple */
    .arvit-spotlight {
      background: linear-gradient(155deg, #1a0030 0%, var(--crimson-deep) 60%, #0d001a 100%);
      animation: spotlightIn .5s cubic-bezier(.4,0,.2,1) forwards;
    }
    /* mincha — warm crimson */
    .mincha-spotlight {
      background: linear-gradient(155deg, var(--crimson-deep) 0%, #6a0020 60%, #3a000e 100%);
      animation: spotlightIn .5s cubic-bezier(.4,0,.2,1) forwards;
    }
    /* shacharit — deep navy-gold */
    .shacharit-spotlight {
      background: linear-gradient(155deg, #0a1830 0%, #1a3060 60%, #0a0e20 100%);
      animation: spotlightIn .5s cubic-bezier(.4,0,.2,1) forwards;
    }

    @keyframes spotlightIn {
      from { opacity:0; transform:scale(.9); }
      to   { opacity:1; transform:scale(1); }
    }

    .sp-title {
      font-family: 'Frank Ruhl Libre', serif;
      font-size: clamp(15px, 2vw, 27px);
      color: var(--gold-light); font-weight: 900;
      letter-spacing: .05em;
      text-shadow: 0 0 18px rgba(200,150,42,0.55);
      line-height: 1.2;
    }
    .sp-time {
      font-size: clamp(36px, 5vw, 70px);
      font-weight: 900;
      font-family: 'Frank Ruhl Libre', serif;
      color: #fff;
      text-shadow: 0 0 28px rgba(200,150,42,0.65), 0 4px 18px rgba(0,0,0,.55);
      line-height: 1;
    }
    .sp-countdown {
      font-size: clamp(12px, 1.3vw, 18px);
      color: var(--gold-light);
      font-weight: 600;
      opacity: .85;
      letter-spacing: .04em;
    }
    .sp-pulse {
      width: 11px; height: 11px; background: var(--gold); border-radius: 50%;
      animation: ring 1.5s ease-in-out infinite;
    }
    @keyframes ring {
      0%   { box-shadow: 0 0 0 0   rgba(200,150,42,.65); }
      70%  { box-shadow: 0 0 0 14px rgba(200,150,42,0); }
      100% { box-shadow: 0 0 0 0   rgba(200,150,42,0); }
    }

    /* ═══ COLUMN CARD ═══ */
    .column {
      background: linear-gradient(160deg, var(--cream) 0%, var(--parchment) 60%, var(--parchment-2) 100%);
      border-radius: var(--r);
      border: 2px solid rgba(200,150,42,0.32);
      box-shadow: 0 4px 18px var(--shadow), inset 0 1px 0 rgba(255,255,255,.65);
      display: flex; flex-direction: column;
      overflow: hidden;
      transition: transform .4s ease, opacity .4s ease;
      min-height: 0;
    }
    .arvit-mode .column,
    .mincha-mode .column { transform: scale(.97); opacity: .9; }

    .col-header {
      background: linear-gradient(135deg, var(--crimson) 0%, var(--crimson-deep) 100%);
      padding: clamp(6px,1.1vh,14px) clamp(8px,1vw,18px);
      text-align: center;
      border-bottom: 2px solid var(--gold);
      position: relative; flex-shrink: 0;
    }
    .col-header::after {
      content: ''; position: absolute; bottom:-1px; left:20%; right:20%; height:2px;
      background: linear-gradient(90deg, transparent, var(--gold-light), transparent);
    }
    .col-title {
      font-family: 'Frank Ruhl Libre', serif;
      font-weight: 900; color: #fff;
      font-size: clamp(15px, 1.9vw, 25px);
      letter-spacing: .03em;
      text-shadow: 0 2px 8px rgba(0,0,0,.4);
    }

    .col-body {
      padding: clamp(5px,.9vh,12px) clamp(5px,.7vw,10px);
      flex: 1; display: flex; flex-direction: column;
      overflow: hidden; min-height: 0;
    }

    .times {
      list-style: none;
      display: flex; flex-direction: column;
      gap: 3px; flex: 1; min-height: 0;
    }

    /* Each item gets equal share of available height — no overflow ever.
       All time boxes (including first/last prayer) share this one look - no per-box
       color variants - and the time text is sized to dominate the box. */
    .time-item {
      background: linear-gradient(135deg, rgba(255,255,255,.72) 0%, rgba(255,255,255,.42) 100%);
      border: 1px solid rgba(200,150,42,.20);
      border-radius: 8px;
      text-align: center;
      font-family: 'Frank Ruhl Libre', serif;
      font-size: clamp(16px, 2.3vw, 32px);
      font-weight: 900; color: var(--ink-mid);
      flex: 1; min-height: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, border-color .2s;
      position: relative;
      padding: 2px 6px;
      overflow: hidden;
    }
    .time-item:hover { background: rgba(200,150,42,.11); border-color: var(--gold); }

    /* Side-by-side item: two times in one row */
    .time-item.side-by-side {
      flex-direction: row;
      gap: 0;
      padding: 2px 4px;
    }
    .time-item.side-by-side .sbs-left,
    .time-item.side-by-side .sbs-right {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
    }
    .time-item.side-by-side .sbs-divider {
      width: 1px;
      align-self: stretch;
      margin: 6px 0;
      background: rgba(200,150,42,0.35);
      flex-shrink: 0;
    }

    /* shimmer */
    .time-item.loading {
      background: linear-gradient(90deg, #e8e0d0 25%, #d8d0c0 50%, #e8e0d0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.3s infinite; color: transparent;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ═══ DAY ZMANIM ROW (below the columns, above the footer) ═══ */
    .day-zmanim-row {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: clamp(5px, .8vw, 12px);
      padding: clamp(4px,.6vh,10px) clamp(6px,1.2vw,20px);
      flex-shrink: 0;
    }
    .day-zman-item {
      background: linear-gradient(160deg, var(--cream) 0%, var(--parchment) 100%);
      border: 1px solid rgba(200,150,42,.30);
      border-radius: 8px;
      text-align: center;
      padding: 4px 3px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 1px;
    }
    .day-zman-item .dz-label {
      font-family: 'Heebo', sans-serif;
      font-size: clamp(9px, .9vw, 12px);
      color: var(--ink-mid);
      font-weight: 600;
      opacity: .82;
      white-space: nowrap;
    }
    .day-zman-item .dz-time {
      font-family: 'Frank Ruhl Libre', serif;
      font-size: clamp(14px, 1.6vw, 21px);
      font-weight: 900;
      color: var(--crimson);
    }

    /* ═══ FOOTER ═══ */
    .site-footer {
      background: linear-gradient(135deg, var(--crimson-deep) 0%, var(--crimson) 100%);
      border-top: 3px solid var(--gold);
      text-align: center;
      padding: clamp(7px,.9vh,14px);
      color: var(--gold-light);
      font-family: 'Frank Ruhl Libre', serif;
      font-weight: 700;
      font-size: clamp(12px, 1.5vw, 19px);
      letter-spacing: .05em;
      text-shadow: 0 1px 6px rgba(0,0,0,.4);
      flex-shrink: 0;
    }

    @media print {
      .sim-panel { display: none; }
      .poster { padding-top: 0; height: auto; }
      .site-header, .site-footer { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
  </style>
</head>
<body>

<!-- ══ SIMULATION PANEL ══ -->
<div class="sim-panel">
  <span class="sim-badge">🧪 סימולציה</span>
  <div class="sim-group">

    <h1>
      <span class="header-star">✦</span>
      בית הכנסת חב״ד — זמני התפילות יום חול
      <span class="header-star">✦</span>
    </h1>
    <div class="header-sub" id="dateDisplay">טוען תאריך...</div>
  </header>
  <main>
    <div class="grid-wrapper" id="grid"></div>
  </main>
  <div class="day-zmanim-row" id="dayZmanimRow"></div>
  <footer class="site-footer">✦ &nbsp; אסור לדבר בשעת התפילה וקריאת התורה &nbsp; ✦</footer>

<script>
/* ══════════════════════════════════════════════════════════
   CONSTANTS
══════════════════════════════════════════════════════════ */
const LAT  = 32.6078;
const LNG  = 35.2897;
const TZID = 'Asia/Jerusalem';
const SHEET_ID  = "1utQ6ndVedwFHoSua02o0w8sGUrsH5ztNL_EzfcqiiK8";
const GID_TIMES = 350737418;
const GVIZ_TIMES = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID_TIMES}`;

/* ══════════════════════════════════════════════════════════
   SIMULATION STATE
══════════════════════════════════════════════════════════ */
let simDateTime = null;
let simZmanim   = {};
function getNow() { return simDateTime ? new Date(simDateTime) : new Date(); }

/* ══════════════════════════════════════════════════════════
   TIME UTILITIES
══════════════════════════════════════════════════════════ */
function fmt(date) {
  if (!date || isNaN(date)) return '--:--';
  return date.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit', hour12: false });
}
function hhmmToDate(str, refDate) {
  if (!str) return null;
  const m = str.match(/(\d{1,2}):(\d{2})/);
  if (!m) return null;
  const d = new Date(refDate || getNow());
  d.setHours(+m[1], +m[2], 0, 0);
  return d;
}
function isoToDate(str) { return str ? new Date(str) : null; }
function keyYMD(d) {
  const p = new Intl.DateTimeFormat('en-CA', {
    timeZone: TZID, year:'numeric', month:'2-digit', day:'2-digit'
  }).formatToParts(d).reduce((a,x)=>(a[x.type]=x.value,a), {});
  return `${p.year}-${p.month}-${p.day}`;
}
function addMin(d, m) { return new Date(d.getTime() + m * 60000); }
function floorTo5(d) {
  const r = new Date(d); r.setSeconds(0,0);
  r.setMinutes(Math.floor(r.getMinutes()/5)*5);
  return r;
}
function nextHalf(d) {
  const r = new Date(d); r.setSeconds(0,0);
  const m = r.getMinutes();
  if (m === 0 || m === 30) return r;
  if (m < 30) { r.setMinutes(30); return r; }
  r.setHours(r.getHours()+1); r.setMinutes(0); return r;
}

/* ══════════════════════════════════════════════════════════
   SHEET: pack multiple times in one cell → side-by-side item
══════════════════════════════════════════════════════════ */
function parseSheetItems(rawItems) {
  const result = [];
  rawItems.forEach(txt => {
    const times = txt.split(/[,،\n]+/).map(s => s.trim()).filter(Boolean);
    if (times.length >= 2) {
      result.push({ left: times[0], right: times[1], cls: 'side-by-side' });
    } else {
      result.push({ label: txt, cls: '' });
    }
  });
  return result;
}

/* Count "visual rows" an item array occupies (side-by-side = 1 row) */
function countRows(items) { return items.length; }

/* ══════════════════════════════════════════════════════════
   PROXY CHAIN (same approach as dailystudy-table.html / dailystudy-dashboard.html / zmanim.html:
   he.chabad.org sends no Access-Control-Allow-Origin, so a direct browser fetch() is blocked
   by CORS even though the URL loads fine in a normal tab. Every proxy here, and chabad.org's
   own bot protection, fail intermittently rather than consistently - trying each in turn
   (2 retries apiece) smooths over transient blips without pretending any one is fully reliable.
══════════════════════════════════════════════════════════ */
function sleep(ms) { return new Promise((resolve) => setTimeout(resolve, ms)); }

async function fetchWithRetry(url, options, attempts = 3, delayMs = 1200) {
  let lastError;
  for (let i = 0; i < attempts; i++) {
    try {
      const res = await fetch(url, options);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res;
    } catch (e) {
      lastError = e;
      if (i < attempts - 1) await sleep(delayMs);
    }
  }
  throw lastError;
}

// Deploy google-apps-script/chabad-rss-proxy.gs and paste its /exec URL here to try it
// first - Google's own servers may have a different bot-protection reputation than free
// public proxies. Left empty, skips straight to the public proxies below.
const APPS_SCRIPT_PROXY_URL = 'https://script.google.com/macros/s/AKfycbz3wnB2VY7KfFlE_b75Gw8T_gpHPyGLR5_xtNETcc6nN74Rywh2bn2tljewDqRrzfk_/exec';

async function fetchViaProxyChain(targetUrl) {
  const attempts = [];
  if (APPS_SCRIPT_PROXY_URL) {
    attempts.push({ name: 'Apps Script', url: APPS_SCRIPT_PROXY_URL + '?url=' + encodeURIComponent(targetUrl), extract: (res) => res.text() });
  }
  attempts.push({ name: 'allorigins.win', url: 'https://api.allorigins.win/get?url=' + encodeURIComponent(targetUrl), extract: async (res) => (await res.json()).contents });
  attempts.push({ name: 'corsproxy.io', url: 'https://corsproxy.io/?' + encodeURIComponent(targetUrl), extract: (res) => res.text() });

  let lastError;
  for (const attempt of attempts) {
    try {
      const res = await fetchWithRetry(attempt.url, { cache: 'no-store' }, 2, 1000);
      const text = await attempt.extract(res);
      console.info(`[proxy chain] succeeded via ${attempt.name} for ${targetUrl}`);
      return text;
    } catch (e) {
      lastError = e;
      console.warn(`[proxy chain] ${attempt.name} failed:`, e.message);
    }
  }
  throw lastError || new Error('All proxy attempts failed');
}

/* ══════════════════════════════════════════════════════════
   CHABAD.ORG ZMANIM RSS (replaces the previous Hebcal zmanim API - per instructions, the
   day's prayer times come exclusively from chabad.org's own feed now). Note: unlike Hebcal's
   API, this feed only ever reflects "today" - the simulation panel's date picker can no
   longer pull live data for an arbitrary date, only the manual zman-override inputs still work
   for testing other dates.
══════════════════════════════════════════════════════════ */
let zmanimCache = null;
const CHABAD_ZMANIM_RSS_URL = 'https://he.chabad.org/tools/rss/zmanim.xml?locationId=803&locationType=1&bDef=0&before=30';

async function fetchChabadZmanim() {
  const xmlText = await fetchViaProxyChain(CHABAD_ZMANIM_RSS_URL);
  const doc = new DOMParser().parseFromString(xmlText, 'application/xml');
  const channel = doc.querySelector('channel');
  if (!channel) throw new Error('מבנה XML לא תקין');
  const items = Array.from(channel.querySelectorAll('item'));

  function findTime(predicate) {
    const item = items.find((it) => predicate(it.querySelector('title')?.textContent || ''));
    if (!item) return null;
    const timeStr = item.querySelector('category')?.textContent || '';
    return hhmmToDate(timeStr, getNow());
  }

  return {
    alot:         findTime((t) => t.includes('עלות')),
    misheyakir:   findTime((t) => t.includes('משיכיר')),
    zriha:        findTime((t) => t.includes('זריחה')),
    sofZmanShema: findTime((t) => t.includes('קריאת שמע')),
    minchaGedola: findTime((t) => t.includes('מנחה גדולה')),
    chatzot:      findTime((t) => t.includes('חצות') && !t.includes('הלילה')),
    sunset:       findTime((t) => t.includes('שקיעה')),
    // "צאת הכוכבים" specifically, not other exit-time items that might appear on the feed
    tzet:         findTime((t) => t.includes('צאת') && t.includes('כוכבים'))
                  || findTime((t) => t.includes('צאת') || t.includes('יציאת')),
  };
}

const ZMANIM_KEYS = ['alot','misheyakir','zriha','sofZmanShema','minchaGedola','chatzot','sunset','tzet'];

async function getZmanim() {
  const now = getNow();
  const dateKey = keyYMD(now);
  let base = Object.fromEntries(ZMANIM_KEYS.map((k) => [k, null]));

  if (zmanimCache && zmanimCache.dateKey === dateKey) {
    base = zmanimCache;
  } else {
    try {
      const s = JSON.parse(localStorage.getItem('zmanim_cache') || 'null');
      if (s && s.dateKey === dateKey) {
        base = { dateKey };
        ZMANIM_KEYS.forEach((k) => { base[k] = s[k] ? new Date(s[k]) : null; });
        zmanimCache = base;
      }
    } catch {}
  }
  if (!zmanimCache || zmanimCache.dateKey !== dateKey) {
    const f = await fetchChabadZmanim();
    base = { dateKey, ...f };
    zmanimCache = base;
    try {
      const toStore = { dateKey };
      ZMANIM_KEYS.forEach((k) => { toStore[k] = f[k]?.toISOString(); });
      localStorage.setItem('zmanim_cache', JSON.stringify(toStore));
    } catch {}
  }
  return {
    ...base,
    minchaGedola: simZmanim.minchaGedola ? hhmmToDate(simZmanim.minchaGedola, now) : base.minchaGedola,
    sunset:       simZmanim.sunset       ? hhmmToDate(simZmanim.sunset, now)       : base.sunset,
    tzet:         simZmanim.tzet         ? hhmmToDate(simZmanim.tzet, now)         : base.tzet,
  };
}

/* ══════════════════════════════════════════════════════════
   HEBCAL DATE
══════════════════════════════════════════════════════════ */
let hebrewDateCache = {};
async function fetchHebrewDate(dateKey) {
  if (hebrewDateCache[dateKey]) return hebrewDateCache[dateKey];
  const [y,m,d] = dateKey.split('-');
  const url = `https://www.hebcal.com/converter?cfg=json&gy=${+y}&gm=${+m}&gd=${+d}&g2h=1`;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`HebCal ${resp.status}`);
  const json = await resp.json();
  const dayMap = {
    Sunday:'יום ראשון', Monday:'יום שני', Tuesday:'יום שלישי',
    Wednesday:'יום רביעי', Thursday:'יום חמישי', Friday:'יום שישי', Saturday:'שבת קודש'
  };
  const dowHe = dayMap[json.dayOfWeek] || json.dayOfWeek || '';
  const result = `${dowHe} · ${json.hebrew || ''} | ${+d}.${+m}.${y}`;
  hebrewDateCache[dateKey] = result;
  return result;
}

/* ══════════════════════════════════════════════════════════
   GVIZ SHEET LOADER
══════════════════════════════════════════════════════════ */
let sheetSections    = null;
let lastArvitFromSheet = null;

function loadGviz(url) {
  return new Promise((resolve, reject) => {
    const tsUrl = url + '&t=' + Date.now();
    window.google = window.google || {};
    window.google.visualization = window.google.visualization || {};
    window.google.visualization.Query = window.google.visualization.Query || {};
    const prev = window.google.visualization.Query.setResponse;
    window.google.visualization.Query.setResponse = (resp) => {
      try {
        if (!resp || resp.status !== 'ok') { reject(new Error('GViz error')); return; }
        resolve(resp.table);
      } finally {
        if (prev) window.google.visualization.Query.setResponse = prev;
        script.remove();
      }
    };
    const script = document.createElement('script');
    script.src = tsUrl;
    script.onerror = () => reject(new Error('GViz network error'));
    document.body.appendChild(script);
  });
}
function gvizCell(c) {
  if (!c) return '';
  if (c.f != null) return c.f;
  if (c.v == null) return '';
  return String(c.v);
}
function isArvitSection(t) {
  const s = t.replace(/[\u0591-\u05C7]/g,'').trim();
  return ['ערבית','מעריב','לילה','ליל','ערב'].some(w => s.includes(w));
}
function isMinchaSection(t) {
  const s = t.replace(/[\u0591-\u05C7]/g,'').trim();
  return ['מנחה','מנחות'].some(w => s.includes(w));
}

async function loadSheetTimes() {
  const table = await loadGviz(GVIZ_TIMES);
  const rows  = table.rows || [];
  const sections = [];
  let lastArvit = null;
  rows.forEach(r => {
    const cells = r.c || [];
    const rawTitle = String(gvizCell(cells[0])).trim();
    if (!rawTitle || rawTitle.toLowerCase() === 'section') return;
    const items = [];
    for (let i = 1; i < cells.length; i++) {
      const txt = String(gvizCell(cells[i])).trim();
      if (txt) items.push(txt);
    }
    if (isMinchaSection(rawTitle)) {
      /* skip */
    } else if (isArvitSection(rawTitle)) {
      if (items.length) lastArvit = items[items.length - 1];
    } else {
      sections.push({ title: rawTitle, items });
    }
  });
  sheetSections    = sections;
  lastArvitFromSheet = lastArvit;
}

/* ══════════════════════════════════════════════════════════
   RENDER
══════════════════════════════════════════════════════════ */
function makeColumn(title, itemDefs) {
  const sec = document.createElement('section');
  sec.className = 'column';

  const hdr = document.createElement('div');
  hdr.className = 'col-header';
  const h2 = document.createElement('h2');
  h2.className = 'col-title';
  h2.textContent = title;
  hdr.appendChild(h2);

  const body = document.createElement('div');
  body.className = 'col-body';
  const ul = document.createElement('ul');
  ul.className = 'times';

  (itemDefs || []).forEach(def => {
    const li = document.createElement('li');
    const item = typeof def === 'string' ? { label: def, cls: '' } : def;
    li.className = 'time-item' + (item.cls ? ' ' + item.cls : '');

    if (item.cls === 'side-by-side') {
      const lSpan = document.createElement('span');
      lSpan.className = 'sbs-left';
      lSpan.textContent = item.left;
      const div = document.createElement('span');
      div.className = 'sbs-divider';
      const rSpan = document.createElement('span');
      rSpan.className = 'sbs-right';
      rSpan.textContent = item.right;
      li.appendChild(lSpan);
      li.appendChild(div);
      li.appendChild(rSpan);
    } else {
      li.textContent = item.label;
    }
    ul.appendChild(li);
  });

  body.appendChild(ul);
  sec.append(hdr, body);
  return sec;
}

function makeSpotlight(type, title, prayerTime, minsUntil) {
  const div = document.createElement('div');
  div.className = `prayer-spotlight ${type}-spotlight`;

  // countdown text
  let countdownHtml = '';
  if (minsUntil > 0) {
    const h = Math.floor(minsUntil / 60);
    const m = minsUntil % 60;
    const parts = [];
    if (h > 0) parts.push(`${h} שעות`);
    if (m > 0 || h === 0) parts.push(`${m} דקות`);
    countdownHtml = `<div class="sp-countdown">בעוד ${parts.join(' ו')}</div>`;
  } else {
    countdownHtml = `<div class="sp-countdown">עכשיו!</div>`;
  }

  div.innerHTML = `
    <div class="sp-title">${title}</div>
    <div class="sp-time">${prayerTime}</div>
    ${countdownHtml}
    <div class="sp-pulse"></div>
  `;
  return div;
}

/* ══════════════════════════════════════════════════════════
   DYNAMIC LAYOUT
   Logic:
   1. Mincha & arvit are capped at a fixed MAX_ROWS_PER_COLUMN boxes each,
      subsampling then pairing extra times side-by-side as needed.
   2. Shacharit columns come straight from the sheet, one row per section item.
   3. Grid columns are spread proportionally so no column ever scrolls.
══════════════════════════════════════════════════════════ */

/**
 * Pack a flat list of time-strings into items,
 * pairing into side-by-side so total rows ≤ maxRows.
 * first/last items are always kept solo (special styling).
 */
function packItems(rawItems, maxRows) {
  if (!rawItems || !rawItems.length) return rawItems;
  if (rawItems.length <= maxRows) return rawItems; // already fits, no pairing needed

  // First & last must stay solo
  const first = rawItems[0];
  const last  = rawItems[rawItems.length - 1];
  const mid   = rawItems.slice(1, -1);

  const paired = [];
  for (let i = 0; i < mid.length; i += 2) {
    if (i + 1 < mid.length && paired.length + 2 + (mid.length - i - 2) > (maxRows - 2)) {
      // Need to pair
      paired.push({ left: mid[i].label || mid[i], right: mid[i+1].label || mid[i+1], cls: 'side-by-side' });
    } else {
      paired.push(mid[i]);
      if (i + 1 < mid.length) paired.push(mid[i+1]);
    }
  }
  return [first, ...paired, last];
}

/**
 * Evenly subsample an array down to at most maxCount items, keeping the
 * first and last and spreading the rest across the original span - used so
 * the side-by-side pairing below always has few enough items to actually
 * respect the hard row cap (pairing alone can only halve the count, which
 * isn't enough when there are many half-hour slots).
 */
function subsampleToFit(arr, maxCount) {
  if (!arr || arr.length <= maxCount) return arr;
  if (maxCount <= 0) return [];
  if (maxCount === 1) return [arr[0]];
  const result = [];
  for (let i = 0; i < maxCount; i++) {
    result.push(arr[Math.floor(i * (arr.length - 1) / (maxCount - 1))]);
  }
  return result;
}

/**
 * Build mincha items, then pack so rows ≤ maxRows
 */
function buildMinchaFit(minchaGedola, sunset, maxRows) {
  if (!minchaGedola || !sunset) return [{label:'ממתין לנתונים...', cls:'loading'}];
  const first      = floorTo5(minchaGedola);
  const lastMincha = floorTo5(addMin(sunset, -15));

  let rawMid = [];
  const seen   = new Set([fmt(first), fmt(lastMincha)]);
  let cur = nextHalf(addMin(first, 1));
  while (cur < lastMincha) {
    const f = fmt(cur);
    if (!seen.has(f)) { seen.add(f); rawMid.push(f); }
    cur = addMin(cur, 30);
  }

  const midMaxRowsCap = Math.max(0, maxRows - 2);
  rawMid = subsampleToFit(rawMid, midMaxRowsCap * 2);

  const firstItem = { label: `מנחה גדולה — ${fmt(first)}`, cls: 'mincha-gedola' };
  const lastItem  = { label: `בזמן — ${fmt(lastMincha)}`,  cls: 'mincha-last' };

  // How many rows left for middle?
  const midMaxRows = Math.max(0, maxRows - 2); // -2 for first and last
  const midItems = [];
  // Pair until we fit
  let i = 0;
  while (i < rawMid.length) {
    if (midItems.length < midMaxRows - 1 || i + 1 >= rawMid.length) {
      // Can still add without pairing — but check if we'll overflow
      const remaining = rawMid.length - i;
      const rowsLeft  = midMaxRows - midItems.length;
      if (remaining > rowsLeft && i + 1 < rawMid.length) {
        // Force pair
        midItems.push({ left: rawMid[i], right: rawMid[i+1], cls: 'side-by-side' });
        i += 2;
      } else {
        midItems.push({ label: rawMid[i], cls: '' });
        i++;
      }
    } else {
      // Pair
      if (i + 1 < rawMid.length) {
        midItems.push({ left: rawMid[i], right: rawMid[i+1], cls: 'side-by-side' });
        i += 2;
      } else {
        midItems.push({ label: rawMid[i], cls: '' });
        i++;
      }
    }
  }

  return [firstItem, ...midItems, lastItem];
}

/**
 * Build arvit items, packed so rows ≤ maxRows
 */
function buildArvitFit(tzet, lastArvit, maxRows) {
  if (!tzet) return [{label:'ממתין לנתונים...', cls:'loading'}];
  const first = tzet; // exact צאת הכוכבים time, not rounded (per instructions)
  const firstItem = { label: `בזמן — ${fmt(first)}`, cls: 'tzet' };

  let rawMid = [];
  const seen   = new Set([fmt(first)]);
  let cur = nextHalf(addMin(first, 1));
  while (lastArvit && cur <= lastArvit) {
    const f = fmt(cur);
    if (!seen.has(f)) { seen.add(f); rawMid.push(f); }
    cur = addMin(cur, 30);
  }

  const midMaxRows = Math.max(0, maxRows - 1);
  rawMid = subsampleToFit(rawMid, midMaxRows * 2);
  const midItems = [];
  let i = 0;
  while (i < rawMid.length) {
    const remaining = rawMid.length - i;
    const rowsLeft  = midMaxRows - midItems.length;
    if (remaining > rowsLeft && i + 1 < rawMid.length) {
      midItems.push({ left: rawMid[i], right: rawMid[i+1], cls: 'side-by-side' });
      i += 2;
    } else {
      midItems.push({ label: rawMid[i], cls: '' });
      i++;
    }
  }

  return [firstItem, ...midItems];
}

// Fixed cap (not tied to how many shacharit rows the sheet happens to have) so mincha/arvit
// never grow past this regardless of how many half-hour slots would otherwise fit - excess
// slots get paired side-by-side instead, same as the existing packing already does.
const MAX_ROWS_PER_COLUMN = 7;

const DAY_ZMANIM_DEFS = [
  { key: 'alot',         label: 'עלות השחר' },
  { key: 'misheyakir',   label: 'טלית ותפילין' },
  { key: 'zriha',        label: 'זריחה' },
  { key: 'sofZmanShema', label: 'סוף ק״ש' },
  { key: 'minchaGedola', label: 'מנחה גדולה' },
  { key: 'chatzot',      label: 'חצות' },
  { key: 'sunset',       label: 'שקיעת החמה' },
  { key: 'tzet',         label: 'צאת הכוכבים' },
];

function renderDayZmanim(zmanim) {
  const row = document.getElementById('dayZmanimRow');
  row.innerHTML = DAY_ZMANIM_DEFS.map((def) => `
    <div class="day-zman-item">
      <div class="dz-label">${def.label}</div>
      <div class="dz-time">${fmt(zmanim?.[def.key])}</div>
    </div>
  `).join('');
}

function render(zmanim, modeObj) {
  const { mode, minsUntil, prayerTime, title, type } = modeObj;
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  grid.className = 'grid-wrapper';

  const now = getNow();
  const lastArvit = lastArvitFromSheet ? hhmmToDate(lastArvitFromSheet, now) : null;

  const staticParsed = (sheetSections || []).map(sec => ({
    title: sec.title,
    items: parseSheetItems(sec.items)
  }));

  const minchaItems = buildMinchaFit(zmanim?.minchaGedola, zmanim?.sunset, MAX_ROWS_PER_COLUMN);
  const arvitItems  = buildArvitFit(zmanim?.tzet, lastArvit, MAX_ROWS_PER_COLUMN);

  const staticCols = staticParsed.map(s => makeColumn(s.title, s.items));
  const minchaCol  = makeColumn('מנחה',  minchaItems);
  const arvitCol   = makeColumn('ערבית', arvitItems);

  const totalRegCols = staticCols.length + 2; // mincha + arvit

  if (mode !== 'normal') {
    // Always: spotlight LEFT, then regular columns
    grid.classList.add('spotlight-mode');
    grid.style.setProperty('--reg-cols', totalRegCols);
    grid.style.gridTemplateColumns = `minmax(180px,20%) repeat(${totalRegCols}, 1fr)`;

    const spot = makeSpotlight(type, title, prayerTime, minsUntil);
    grid.appendChild(spot);
    staticCols.forEach(c => grid.appendChild(c));
    grid.appendChild(minchaCol);
    grid.appendChild(arvitCol);

  } else {
    grid.style.gridTemplateColumns = `repeat(${totalRegCols}, 1fr)`;
    staticCols.forEach(c => grid.appendChild(c));
    grid.appendChild(minchaCol);
    grid.appendChild(arvitCol);
  }

  renderDayZmanim(zmanim);
}

/* ══════════════════════════════════════════════════════════
   MODE DETECTION
   Returns: { mode, minsUntil, prayerTime, title, type }
   mode: 'normal' | 'shacharit' | 'mincha-first' | 'mincha-last' | 'arvit'
══════════════════════════════════════════════════════════ */
function detectMode(zmanim) {
  if (!zmanim) return { mode: 'normal' };
  const now = getNow();

  // Shacharit: first time from sheet sections
  let shacharitFirst = null;
  if (sheetSections && sheetSections.length) {
    // Find the earliest time across all static sections
    sheetSections.forEach(sec => {
      (sec.items || []).forEach(txt => {
        // Each cell may have comma-separated times — take the first
        const t = txt.split(/[,،\n]/)[0].trim();
        const d = hhmmToDate(t, now);
        if (d && (!shacharitFirst || d < shacharitFirst)) shacharitFirst = d;
      });
    });
  }

  const minchaFirst = zmanim.minchaGedola ? floorTo5(zmanim.minchaGedola) : null;
  const minchaLast  = zmanim.sunset       ? floorTo5(addMin(zmanim.sunset, -15)) : null;
  const tzet        = zmanim.tzet;

  // Check each event: show spotlight 10 min before until the event passes (or 10 min after for mincha)
  // Priority: arvit > mincha-last > mincha-first > shacharit

  // Arvit and first-Mincha notices disappear the moment their prayer's minute passes
  // (mins >= 0), rather than lingering afterward, per instructions.
  if (tzet) {
    const mins = (tzet - now) / 60000;
    if (mins <= 10 && mins >= 0)
      return { mode: 'arvit', minsUntil: Math.max(0, Math.round(mins)),
               prayerTime: fmt(tzet), title: 'תפילת ערבית ראשונה', type: 'arvit' };
  }
  if (minchaLast) {
    const mins = (minchaLast - now) / 60000;
    if (mins <= 10 && mins >= -10)
      return { mode: 'mincha-last', minsUntil: Math.max(0, Math.round(mins)),
               prayerTime: fmt(minchaLast), title: 'מנחה אחרונה', type: 'mincha' };
  }
  if (minchaFirst) {
    const mins = (minchaFirst - now) / 60000;
    if (mins <= 10 && mins >= 0)
      return { mode: 'mincha-first', minsUntil: Math.max(0, Math.round(mins)),
               prayerTime: fmt(minchaFirst), title: 'מנחה גדולה', type: 'mincha' };
  }
  if (shacharitFirst) {
    const mins = (shacharitFirst - now) / 60000;
    if (mins <= 10 && mins >= -10)
      return { mode: 'shacharit', minsUntil: Math.max(0, Math.round(mins)),
               prayerTime: fmt(shacharitFirst), title: 'שחרית ראשונה', type: 'shacharit' };
  }

  return { mode: 'normal' };
}

/* ══════════════════════════════════════════════════════════
   TICK LOOP
══════════════════════════════════════════════════════════ */
let lastMinute    = -1;
let lastModeKey   = null;
let currentZmanim = null;
let loadedDateKey = null;

function tick() {
  const now     = getNow();
  const curMin  = now.getHours() * 60 + now.getMinutes();
  const dateKey = keyYMD(now);

  if (dateKey !== loadedDateKey) {
    loadedDateKey = dateKey;
    fullRefresh(now, dateKey);
    return;
  }

  const modeObj = detectMode(currentZmanim);
  const modeKey = modeObj.mode + ':' + (modeObj.minsUntil ?? '');

  if (curMin !== lastMinute || modeKey !== lastModeKey) {
    lastMinute  = curMin;
    lastModeKey = modeKey;
    render(currentZmanim, modeObj);
  }
}

async function fullRefresh(now, dateKey) {
  setStatus('loading', 'טוען זמנים...');

  try {
    const dateStr = await fetchHebrewDate(dateKey);
    document.getElementById('dateDisplay').textContent = dateStr;
  } catch (e) {
    console.warn('HebCal date fail', e);
    document.getElementById('dateDisplay').textContent =
      now.toLocaleDateString('he-IL', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
  }

  try {
    currentZmanim = await getZmanim();
    setStatus('ok',
      `שקיעה: ${fmt(currentZmanim.sunset)} | ` +
      `מנחה: ${fmt(currentZmanim.minchaGedola)} | ` +
      `צאת: ${fmt(currentZmanim.tzet)} | ` +
      `ערבית אחרונה: ${lastArvitFromSheet || '—'}`
    );
  } catch (e) {
    console.error('Zmanim fetch fail', e);
    setStatus('err', 'שגיאה: ' + e.message);
    currentZmanim = null;
  }

  lastMinute  = -1;
  lastModeKey = null;
  tick();
}

function setStatus(type, msg) {
  document.getElementById('simStatus').innerHTML = `<span class="${type}">${msg}</span>`;
}

/* ══════════════════════════════════════════════════════════
   SIMULATION CONTROLS
══════════════════════════════════════════════════════════ */
function applySimulation() {
  const d = document.getElementById('simDate').value;
  const t = document.getElementById('simTime').value;
  simZmanim = {
    minchaGedola: document.getElementById('ovMinchaGedola').value || null,
    sunset:       document.getElementById('ovSunset').value       || null,
    tzet:         document.getElementById('ovTzet').value         || null,
  };
  if (d && t) simDateTime = new Date(`${d}T${t}`);
  zmanimCache   = null;
  loadedDateKey = null;
  lastMinute    = -1;
  fullRefresh(getNow(), keyYMD(getNow()));
}

function resetAll() {
  simDateTime = null; simZmanim = {}; zmanimCache = null;
  loadedDateKey = null; lastMinute = -1;
  const now = new Date();
  document.getElementById('simDate').value = keyYMD(now);
  document.getElementById('simTime').value =
    String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  ['ovMinchaGedola','ovSunset','ovTzet'].forEach(id =>
    document.getElementById(id).value = '');
  fullRefresh(now, keyYMD(now));
}

/* ══════════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════════ */
(async function init() {
  document.getElementById('grid').innerHTML =
    `<section class="column"><div class="col-header"><h2 class="col-title">טוען...</h2></div>
     <div class="col-body"><ul class="times">
       ${Array(5).fill('<li class="time-item loading">--:--</li>').join('')}
     </ul></div></section>`.repeat(3);

  const now = new Date();
  document.getElementById('simDate').value = keyYMD(now);
  document.getElementById('simTime').value =
    String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');

  try { await loadSheetTimes(); }
  catch (e) {
    console.warn('Sheet load fail', e);
    sheetSections = []; lastArvitFromSheet = '22:00';
  }

  await fullRefresh(now, keyYMD(now));
  setInterval(tick, 1000);
})();
