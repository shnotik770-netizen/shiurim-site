<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>זמני תפילות - יום חול</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&family=Frank+Ruhl+Libre:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --crimson: #7a1030;
      --crimson-deep: #4e0a1f;
      --gold: #c8962a;
      --gold-light: #e8b84b;
      --cream: #fdf6e8;
      --parchment: #f5ead0;
      --parchment-2: #ede0c0;
      --ink: #1e1209;
      --ink-mid: #5a3a1a;
      --shadow: rgba(78,10,31,0.18);
      --r: 18px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Heebo', 'Frank Ruhl Libre', serif;
      background: var(--crimson-deep);
      color: var(--ink);
      height: 100dvh;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 20%, rgba(200,150,42,0.10) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 80% 80%, rgba(122,16,48,0.22) 0%, transparent 60%),
        repeating-linear-gradient(45deg, transparent, transparent 40px,
          rgba(255,255,255,0.012) 40px, rgba(255,255,255,0.012) 41px);
      pointer-events: none; z-index: 0;
    }

    /* ═══ SIMULATION PANEL ═══ */
    .sim-panel {
      position: fixed; top: 0; left: 0; right: 0;
      background: rgba(12,2,6,0.96);
      backdrop-filter: blur(10px);
      border-bottom: 2px solid var(--gold);
      padding: 7px 14px;
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      z-index: 1000;
      font-family: 'Heebo', sans-serif;
      font-size: 12px; color: #bbb;
    }
    .sim-badge {
      background: var(--gold); color: var(--ink);
      border-radius: 5px; padding: 2px 8px;
      font-weight: 700; font-size: 11px;
    }
    .sim-group {
      display: flex; align-items: center; gap: 6px;
      border-right: 1px solid rgba(200,150,42,0.25);
      padding-right: 10px; margin-right: 2px;
    }
    .sim-group:last-of-type { border-right: none; }
    .sim-group label { color: #999; white-space: nowrap; }
    .sim-panel input[type="date"],
    .sim-panel input[type="time"] {
      background: #1a0510; border: 1px solid rgba(200,150,42,0.5);
      color: var(--gold-light); padding: 2px 6px; border-radius: 4px;
      font-family: 'Heebo', sans-serif; font-size: 12px; cursor: pointer;
      width: 120px;
    }
    .sim-panel input[type="time"].zman-override {
      width: 70px;
    }
    .sim-btn {
      background: var(--crimson); border: 1px solid rgba(200,150,42,0.6);
      color: var(--gold-light); padding: 3px 10px; border-radius: 6px;
      cursor: pointer; font-size: 11px; font-family: 'Heebo', sans-serif;
      font-weight: 700; transition: background .2s; white-space: nowrap;
    }
    .sim-btn:hover { background: #9a1840; }
    .sim-status {
      margin-right: auto;
      color: #888; font-size: 11px;
    }
    .sim-status .ok { color: #5d5; }
    .sim-status .err { color: #d55; }
    .sim-status .loading { color: #aa8; }

    /* ═══ POSTER ═══ */
    .poster {
      position: relative; z-index: 1;
      height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding-top: 38px;
    }

    /* ═══ HEADER ═══ */
    .site-header {
      background: linear-gradient(135deg, var(--crimson-deep) 0%, var(--crimson) 50%, #9a1a40 100%);
      border-bottom: 3px solid var(--gold);
      padding: clamp(6px,1vh,16px) 2rem;
      text-align: center;
      position: relative; overflow: hidden;
    }
    .site-header::before {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(90deg, transparent, transparent 60px,
        rgba(200,150,42,0.055) 60px, rgba(200,150,42,0.055) 61px);
    }
    .site-header h1 {
      font-family: 'Frank Ruhl Libre', serif;
      font-weight: 900; color: #fff;
      font-size: clamp(16px, 3vw, 38px);
      letter-spacing: .04em;
      text-shadow: 0 2px 12px rgba(0,0,0,.5);
      position: relative;
    }
    .header-star { color: var(--gold); opacity: .7; margin: 0 10px; }
    .header-sub {
      color: var(--gold-light);
      font-size: clamp(10px, 1.2vw, 15px);
      font-weight: 400; margin-top: 2px;
      letter-spacing: .06em; opacity: .88;
      position: relative;
    }

    /* ═══ MAIN ═══ */
    main {
      padding: clamp(6px,1vh,16px) clamp(6px,1.2vw,20px);
      overflow: hidden;
      display: flex; flex-direction: column;
    }

    .grid-wrapper {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: clamp(7px, 1vw, 18px);
      flex: 1;
      transition: grid-template-columns .55s cubic-bezier(.4,0,.2,1);
    }
    .grid-wrapper.arvit-mode {
      grid-template-columns: minmax(240px, 34%) repeat(3, 1fr);
    }

    /* ─── Arvit spotlight ─── */
    .arvit-spotlight {
      display: none;
      background: linear-gradient(155deg, #1a0030 0%, var(--crimson-deep) 60%, #0d001a 100%);
      border: 3px solid var(--gold);
      border-radius: var(--r);
      box-shadow: 0 0 50px rgba(200,150,42,0.38), inset 0 0 40px rgba(0,0,0,.45);
      align-items: center; justify-content: center;
      text-align: center; flex-direction: column; gap: 10px;
      animation: spotlightIn .5s cubic-bezier(.4,0,.2,1) forwards;
      position: relative; overflow: hidden;
    }
    .arvit-mode .arvit-spotlight { display: flex; }
    .arvit-spotlight::before { content:'✦'; position:absolute; top:10px; right:14px; color:var(--gold); opacity:.35; font-size:18px; }
    .arvit-spotlight::after  { content:'✦'; position:absolute; bottom:10px; left:14px; color:var(--gold); opacity:.35; font-size:18px; }
    @keyframes spotlightIn {
      from { opacity:0; transform:scale(.9) translateX(-18px); }
      to   { opacity:1; transform:scale(1)  translateX(0); }
    }
    .sp-label {
      font-family: 'Frank Ruhl Libre', serif;
      font-size: clamp(13px, 1.7vw, 22px);
      color: var(--gold-light); font-weight: 700;
      letter-spacing: .06em;
      text-shadow: 0 0 18px rgba(200,150,42,0.55);
    }
    .sp-time {
      font-size: clamp(40px, 6vw, 80px);
      font-weight: 900;
      font-family: 'Frank Ruhl Libre', serif;
      color: #fff;
      text-shadow: 0 0 28px rgba(200,150,42,0.65), 0 4px 18px rgba(0,0,0,.55);
      line-height: 1;
    }
    .sp-sub { font-size: clamp(11px, 1.1vw, 15px); color: var(--gold); opacity: .8; font-weight: 400; }
    .sp-pulse {
      width: 11px; height: 11px; background: var(--gold); border-radius: 50%;
      animation: ring 1.5s ease-in-out infinite;
    }
    @keyframes ring {
      0%   { box-shadow: 0 0 0 0   rgba(200,150,42,.65); }
      70%  { box-shadow: 0 0 0 14px rgba(200,150,42,0); }
      100% { box-shadow: 0 0 0 0   rgba(200,150,42,0); }
    }

    /* ═══ COLUMN CARD ═══ */
    .column {
      background: linear-gradient(160deg, var(--cream) 0%, var(--parchment) 60%, var(--parchment-2) 100%);
      border-radius: var(--r);
      border: 2px solid rgba(200,150,42,0.32);
      box-shadow: 0 4px 18px var(--shadow), inset 0 1px 0 rgba(255,255,255,.65);
      display: flex; flex-direction: column;
      overflow: hidden;
      transition: transform .4s ease, opacity .4s ease;
      height: 100%;
    }
    .arvit-mode .column { transform: scale(.96); opacity: .88; }
    .col-header {
      background: linear-gradient(135deg, var(--crimson) 0%, var(--crimson-deep) 100%);
      padding: clamp(7px,1.2vh,16px) clamp(8px,1vw,18px);
      text-align: center;
      border-bottom: 2px solid var(--gold);
      position: relative; flex-shrink: 0;
    }
    .col-header::after {
      content: ''; position: absolute; bottom:-1px; left:20%; right:20%; height:2px;
      background: linear-gradient(90deg, transparent, var(--gold-light), transparent);
    }
    .col-title {
      font-family: 'Frank Ruhl Libre', serif;
      font-weight: 900; color: #fff;
      font-size: clamp(16px, 2vw, 26px);
      letter-spacing: .03em;
      text-shadow: 0 2px 8px rgba(0,0,0,.4);
    }
    .col-body {
      padding: clamp(6px,1vh,14px) clamp(6px,.8vw,12px);
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
    }
    .times {
      list-style: none;
      display: flex; flex-direction: column;
      gap: 4px; flex: 1;
    }
    .time-item {
      background: linear-gradient(135deg, rgba(255,255,255,.72) 0%, rgba(255,255,255,.42) 100%);
      border: 1px solid rgba(200,150,42,.20);
      border-radius: 10px;
      padding: clamp(4px,.8vh,10px) clamp(6px,.6vw,12px);
      text-align: center;
      font-family: 'Frank Ruhl Libre', serif;
      font-size: clamp(15px, 1.75vw, 24px);
      font-weight: 700; color: var(--ink-mid);
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, border-color .2s;
      position: relative;
    }
    .time-item:hover { background: rgba(200,150,42,.11); border-color: var(--gold); }
    .time-item.bizman {
      background: linear-gradient(135deg, rgba(122,16,48,.07) 0%, rgba(200,150,42,.09) 100%);
      border: 2px solid rgba(200,150,42,.48);
      color: var(--crimson); font-weight: 900;
    }
    .time-item.bizman::before {
      content: '★'; position: absolute; left: 9px;
      color: var(--gold); font-size: 12px; opacity: .75;
    }
    .time-item.tzet {
      background: linear-gradient(135deg, rgba(20,0,50,.07) 0%, rgba(80,20,140,.08) 100%);
      border: 2px solid rgba(100,40,180,.32);
      color: #3a1060; font-weight: 900;
    }
    .time-item.tzet::before { content:'🌙'; position:absolute; left:8px; font-size:13px; }
    .time-item.loading {
      background: linear-gradient(90deg, #e8e0d0 25%, #d8d0c0 50%, #e8e0d0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.3s infinite; color: transparent;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ═══ FOOTER ═══ */
    .site-footer {
      background: linear-gradient(135deg, var(--crimson-deep) 0%, var(--crimson) 100%);
      border-top: 3px solid var(--gold);
      text-align: center;
      padding: clamp(7px,.9vh,14px);
      color: var(--gold-light);
      font-family: 'Frank Ruhl Libre', serif;
      font-weight: 700;
      font-size: clamp(12px, 1.5vw, 19px);
      letter-spacing: .05em;
      text-shadow: 0 1px 6px rgba(0,0,0,.4);
      flex-shrink: 0;
    }

    @media print {
      .sim-panel { display: none; }
      .poster { padding-top: 0; height: auto; }
      .site-header, .site-footer { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
  </style>
</head>
<body>

<!-- ══ SIMULATION PANEL ══ -->
<div class="sim-panel">
  <span class="sim-badge">🧪 סימולציה</span>

  <!-- Date + time -->
  <div class="sim-group">
    <label>תאריך:</label>
    <input type="date" id="simDate" />
    <label>שעה:</label>
    <input type="time" id="simTime" />
  </div>

  <!-- Zmanim manual overrides -->
  <div class="sim-group">
    <label>מנחה גד':</label>
    <input type="time" id="ovMinchaGedola" class="zman-override" placeholder="אוטו" title="עקוף מנחה גדולה" />
    <label>שקיעה:</label>
    <input type="time" id="ovSunset" class="zman-override" placeholder="אוטו" title="עקוף שקיעה" />
    <label>צאת:</label>
    <input type="time" id="ovTzet" class="zman-override" placeholder="אוטו" title="עקוף צאת הכוכבים" />
  </div>

  <div class="sim-group">
    <button class="sim-btn" onclick="applySimulation()">עדכן</button>
    <button class="sim-btn" onclick="resetAll()">אפס הכל</button>
  </div>

  <span class="sim-status" id="simStatus"><span class="loading">טוען...</span></span>
</div>

<div class="poster">
  <header class="site-header">
    <h1>
      <span class="header-star">✦</span>
      בית הכנסת חב״ד — זמני התפילות יום חול
      <span class="header-star">✦</span>
    </h1>
    <div class="header-sub" id="dateDisplay">טוען תאריך...</div>
  </header>

  <main>
    <div class="grid-wrapper" id="grid"></div>
  </main>

  <footer class="site-footer">✦ &nbsp; אסור לדבר בשעת התפילה וקריאת התורה &nbsp; ✦</footer>
</div>

<script>
/* ══════════════════════════════════════════════════════════
   CONSTANTS — עפולה
══════════════════════════════════════════════════════════ */
const LAT  = 32.6078;
const LNG  = 35.2897;
const TZID = 'Asia/Jerusalem';

// Google Sheet — prayer schedule (shacharit rows + last arvit)
const SHEET_ID  = "1utQ6ndVedwFHoSua02o0w8sGUrsH5ztNL_EzfcqiiK8";
const GID_TIMES = 350737418;
const GVIZ_TIMES = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID_TIMES}`;

/* ══════════════════════════════════════════════════════════
   SIMULATION STATE
══════════════════════════════════════════════════════════ */
let simDateTime = null;          // overridden "now"
let simZmanim   = {};            // manual zmanim overrides { minchaGedola, sunset, tzet }

function getNow() { return simDateTime ? new Date(simDateTime) : new Date(); }

/* ══════════════════════════════════════════════════════════
   TIME UTILITIES
══════════════════════════════════════════════════════════ */
function fmt(date) {
  if (!date || isNaN(date)) return '--:--';
  return date.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit', hour12: false });
}

// "HH:MM" string → Date object on the reference date
function hhmmToDate(str, refDate) {
  if (!str) return null;
  const m = str.match(/(\d{1,2}):(\d{2})/);
  if (!m) return null;
  const d = new Date(refDate || getNow());
  d.setHours(+m[1], +m[2], 0, 0);
  return d;
}

// ISO timestamp string → Date
function isoToDate(str) {
  if (!str) return null;
  return new Date(str);
}

function keyYMD(d) {
  const p = new Intl.DateTimeFormat('en-CA', {
    timeZone: TZID, year:'numeric', month:'2-digit', day:'2-digit'
  }).formatToParts(d).reduce((a,p)=>(a[p.type]=p.value,a), {});
  return `${p.year}-${p.month}-${p.day}`;
}

function addMin(d, m) { return new Date(d.getTime() + m * 60000); }
function floorTo5(d)  {
  const r = new Date(d); r.setSeconds(0,0);
  r.setMinutes(Math.floor(r.getMinutes()/5)*5);
  return r;
}
function nextHalf(d) {
  const r = new Date(d); r.setSeconds(0,0);
  const m = r.getMinutes();
  if (m === 0 || m === 30) return r;
  if (m < 30) { r.setMinutes(30); return r; }
  r.setHours(r.getHours()+1); r.setMinutes(0);
  return r;
}

/* ══════════════════════════════════════════════════════════
   PRAYER-TIME BUILDERS
══════════════════════════════════════════════════════════ */
function buildMincha(minchaGedola, sunset) {
  if (!minchaGedola || !sunset) return [{label:'ממתין לנתונים...', cls:'loading'}];
  const first    = floorTo5(minchaGedola);
  const lastMincha = floorTo5(addMin(sunset, -15));
  const items = [{ label: `בזמן - ${fmt(first)}`, cls: 'bizman' }];
  let cur = nextHalf(addMin(first, 1));
  const seen = new Set([fmt(first)]);
  while (cur <= lastMincha) {
    const f = fmt(cur);
    if (!seen.has(f)) { seen.add(f); items.push({ label: f, cls: '' }); }
    cur = addMin(cur, 30);
  }
  const lastF = fmt(lastMincha);
  if (!seen.has(lastF)) items.push({ label: lastF, cls: '' });
  return items;
}

function buildArvit(tzet, lastArvit) {
  if (!tzet) return [{label:'ממתין לנתונים...', cls:'loading'}];
  const first = floorTo5(tzet);
  const items = [{ label: fmt(first), cls: 'tzet' }];
  const seen  = new Set([fmt(first)]);
  let cur = nextHalf(addMin(first, 1));
  while (lastArvit && cur <= lastArvit) {
    const f = fmt(cur);
    if (!seen.has(f)) { seen.add(f); items.push({ label: f, cls: '' }); }
    cur = addMin(cur, 30);
  }
  return items;
}

/* ══════════════════════════════════════════════════════════
   HEBCAL ZMANIM API
   Returns { minchaGedola: Date, sunset: Date, tzet: Date }
══════════════════════════════════════════════════════════ */
let zmanimCache = null;  // { dateKey, minchaGedola, sunset, tzet }

async function fetchHebcalZmanim(dateKey) {
  const url = `https://www.hebcal.com/zmanim?cfg=json&latitude=${LAT}&longitude=${LNG}&tzid=${TZID}&date=${dateKey}`;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`Hebcal ${resp.status}`);
  const json = await resp.json();
  const t = json.times || {};
  // minchaGedola: prefer minchaGedola, fallback minchaGedolaBaalHatanya
  const mg  = t.minchaGedola  || t.minchaGedolaBaalHatanya;
  const ss  = t.sunset;
  // tzet: prefer tzeit7083deg (3 medium stars, most common Israel practice), then baalHatanya, then tzeit85deg
  const tz  = t.tzeit7083deg  || t.tzaisBaalHatanya || t.tzeit85deg || t.dusk;
  return {
    minchaGedola: isoToDate(mg),
    sunset:       isoToDate(ss),
    tzet:         isoToDate(tz)
  };
}

async function getZmanim() {
  const now = getNow();
  const dateKey = keyYMD(now);

  // Apply manual sim overrides on top
  let base = { minchaGedola: null, sunset: null, tzet: null };

  // Cache hit?
  if (zmanimCache && zmanimCache.dateKey === dateKey) {
    base = zmanimCache;
  } else {
    // Try localStorage
    try {
      const s = JSON.parse(localStorage.getItem('zmanim_cache') || 'null');
      if (s && s.dateKey === dateKey) {
        base = {
          dateKey,
          minchaGedola: s.minchaGedola ? new Date(s.minchaGedola) : null,
          sunset:       s.sunset       ? new Date(s.sunset)       : null,
          tzet:         s.tzet         ? new Date(s.tzet)         : null,
        };
        zmanimCache = base;
      }
    } catch {}
  }

  if (!zmanimCache || zmanimCache.dateKey !== dateKey) {
    const fetched = await fetchHebcalZmanim(dateKey);
    base = { dateKey, ...fetched };
    zmanimCache = base;
    try {
      localStorage.setItem('zmanim_cache', JSON.stringify({
        dateKey,
        minchaGedola: fetched.minchaGedola?.toISOString(),
        sunset:       fetched.sunset?.toISOString(),
        tzet:         fetched.tzet?.toISOString(),
      }));
    } catch {}
  }

  // Merge sim overrides
  return {
    minchaGedola: simZmanim.minchaGedola ? hhmmToDate(simZmanim.minchaGedola, now) : base.minchaGedola,
    sunset:       simZmanim.sunset       ? hhmmToDate(simZmanim.sunset,       now) : base.sunset,
    tzet:         simZmanim.tzet         ? hhmmToDate(simZmanim.tzet,         now) : base.tzet,
  };
}

/* ══════════════════════════════════════════════════════════
   HEBCAL DATE — Hebrew date string
   /converter?cfg=json&gy=Y&gm=M&gd=D&g2h=1
══════════════════════════════════════════════════════════ */
let hebrewDateCache = {};  // dateKey → string

async function fetchHebrewDate(dateKey) {
  if (hebrewDateCache[dateKey]) return hebrewDateCache[dateKey];
  const [y, m, d] = dateKey.split('-');
  const url = `https://www.hebcal.com/converter?cfg=json&gy=${+y}&gm=${+m}&gd=${+d}&g2h=1`;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`HebCal conv ${resp.status}`);
  const json = await resp.json();
  // json: { hy, hm, hd, hebrew (string), heDateParts, dayOfWeek... }
  // Build: "יום ראשון · כ׳ בסיוון תשפ"ה | 29.5.2025"
  const dow  = json.dayOfWeek || '';   // e.g. "Sunday"
  const heb  = json.hebrew    || '';   // e.g. "כ׳ בסיוון תשפ"ה"
  const greg = `${+d}.${+m}.${y}`;
  // Translate English day → Hebrew
  const dayMap = {
    Sunday:'יום ראשון', Monday:'יום שני', Tuesday:'יום שלישי',
    Wednesday:'יום רביעי', Thursday:'יום חמישי', Friday:'יום שישי', Saturday:'שבת קודש'
  };
  const dowHe = dayMap[dow] || dow;
  const result = `${dowHe} · ${heb} | ${greg}`;
  hebrewDateCache[dateKey] = result;
  return result;
}

/* ══════════════════════════════════════════════════════════
   GVIZ: sheet prayer times
   Reads shacharit sections + extracts last arvit time
══════════════════════════════════════════════════════════ */
let sheetSections    = null;
let lastArvitFromSheet = null;

function loadGviz(url) {
  return new Promise((resolve, reject) => {
    const tsUrl = url + '&t=' + Date.now();
    window.google = window.google || {};
    window.google.visualization = window.google.visualization || {};
    window.google.visualization.Query = window.google.visualization.Query || {};
    const prev = window.google.visualization.Query.setResponse;
    window.google.visualization.Query.setResponse = (resp) => {
      try {
        if (!resp || resp.status !== 'ok') { reject(new Error('GViz error')); return; }
        resolve(resp.table);
      } finally {
        if (prev) window.google.visualization.Query.setResponse = prev;
        script.remove();
      }
    };
    const script = document.createElement('script');
    script.src = tsUrl;
    script.onerror = () => reject(new Error('GViz network error'));
    document.body.appendChild(script);
  });
}

function gvizCellValue(c) {
  if (!c) return '';
  if (c.f != null) return c.f;
  if (c.v == null) return '';
  return String(c.v);
}

// Identify if a section title is "arvit / maariv" by keywords
function isArvitSection(title) {
  const t = title.replace(/[\u0591-\u05C7]/g, '').trim(); // strip niqqud/taamim
  const arvitWords = ['ערבית','מעריב','מעריב','לילה','ליל','לילי','ערב','arvit','maariv'];
  return arvitWords.some(w => t.includes(w));
}

// Identify if a section title is "mincha" — to SKIP it (will be auto-computed)
function isMinchaSection(title) {
  const t = title.replace(/[\u0591-\u05C7]/g, '').trim();
  const minchaWords = ['מנחה','מנחות','mincha','mincha'];
  return minchaWords.some(w => t.includes(w));
}

async function loadSheetTimes() {
  const table = await loadGviz(GVIZ_TIMES);
  const rows = table.rows || [];
  const sections = [];
  let lastArvit = null;

  rows.forEach(r => {
    const cells = r.c || [];
    const rawTitle = gvizCellValue(cells[0]).trim();
    if (!rawTitle || rawTitle.toLowerCase() === 'section') return;

    const items = [];
    for (let i = 1; i < cells.length; i++) {
      const txt = gvizCellValue(cells[i]).trim();
      if (txt) items.push(txt);
    }

    if (isMinchaSection(rawTitle)) {
      // Skip — mincha is auto-computed. Do nothing.
    } else if (isArvitSection(rawTitle)) {
      // Extract last time for arvit cutoff; skip from static render
      if (items.length) lastArvit = items[items.length - 1];
    } else {
      sections.push({ title: rawTitle, items });
    }
  });

  sheetSections    = sections;
  lastArvitFromSheet = lastArvit;
}

/* ══════════════════════════════════════════════════════════
   RENDER
══════════════════════════════════════════════════════════ */
function makeColumn(title, itemDefs) {
  const sec = document.createElement('section');
  sec.className = 'column';
  const hdr = document.createElement('div');
  hdr.className = 'col-header';
  const h2 = document.createElement('h2');
  h2.className = 'col-title';
  h2.textContent = title;
  hdr.appendChild(h2);
  const body = document.createElement('div');
  body.className = 'col-body';
  const ul = document.createElement('ul');
  ul.className = 'times';
  (itemDefs || []).forEach(def => {
    const li = document.createElement('li');
    const s = typeof def === 'string';
    li.className = 'time-item' + (s ? '' : (def.cls ? ' '+def.cls : ''));
    li.textContent = s ? def : def.label;
    ul.appendChild(li);
  });
  body.appendChild(ul);
  sec.append(hdr, body);
  return sec;
}

function makeArvitSpotlight(firstTime) {
  const div = document.createElement('div');
  div.className = 'arvit-spotlight';
  div.innerHTML = `
    <div class="sp-label">תפילת ערבית</div>
    <div class="sp-label" style="font-size:clamp(11px,1vw,14px);opacity:.6;font-weight:400">צאת הכוכבים — עפולה</div>
    <div class="sp-time">${firstTime}</div>
    <div class="sp-sub">המשך כל חצי שעה</div>
    <div class="sp-pulse"></div>
  `;
  return div;
}

function render(zmanim, isArvitMode) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  grid.classList.toggle('arvit-mode', isArvitMode);

  const now = getNow();
  const lastArvit = lastArvitFromSheet ? hhmmToDate(lastArvitFromSheet, now) : null;

  // Auto-computed columns
  const minchaItems = buildMincha(zmanim?.minchaGedola, zmanim?.sunset);
  const arvitItems  = buildArvit(zmanim?.tzet, lastArvit);

  const allCols = [];
  // Static (shacharit etc.) — only non-mincha, non-arvit sections from sheet
  (sheetSections || []).forEach(sec =>
    allCols.push(makeColumn(sec.title, sec.items.map(i => ({ label: i, cls: '' }))))
  );
  // Mincha (always auto)
  allCols.push(makeColumn('מנחה', minchaItems));

  if (isArvitMode && arvitItems.length) {
    const spot = makeArvitSpotlight(arvitItems[0].label);
    grid.appendChild(spot);
    allCols.forEach(c => grid.appendChild(c));
  } else {
    allCols.push(makeColumn('ערבית', arvitItems));
    allCols.forEach(c => grid.appendChild(c));
  }
}

/* ══════════════════════════════════════════════════════════
   TICK LOOP
══════════════════════════════════════════════════════════ */
let lastMinute   = -1;
let lastArvitMode = null;
let currentZmanim = null;
let loadedDateKey = null;

function tick() {
  const now = getNow();
  const curMin = now.getHours() * 60 + now.getMinutes();
  const dateKey = keyYMD(now);

  if (dateKey !== loadedDateKey) {
    loadedDateKey = dateKey;
    fullRefresh(now, dateKey);
    return;
  }

  let isArvitMode = false;
  if (currentZmanim?.tzet) {
    const mins = (currentZmanim.tzet - now) / 60000;
    isArvitMode = mins <= 10 && mins >= -120;
  }

  if (curMin !== lastMinute || isArvitMode !== lastArvitMode) {
    lastMinute    = curMin;
    lastArvitMode = isArvitMode;
    render(currentZmanim, isArvitMode);
  }
}

async function fullRefresh(now, dateKey) {
  setStatus('loading', 'טוען זמנים...');

  // Hebrew date from HebCal
  try {
    const dateStr = await fetchHebrewDate(dateKey);
    document.getElementById('dateDisplay').textContent = dateStr;
  } catch (e) {
    console.warn('HebCal date fail', e);
    document.getElementById('dateDisplay').textContent =
      now.toLocaleDateString('he-IL', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
  }

  // Zmanim
  try {
    currentZmanim = await getZmanim();
    setStatus('ok',
      `שקיעה: ${fmt(currentZmanim.sunset)} | ` +
      `מנחה: ${fmt(currentZmanim.minchaGedola)} | ` +
      `צאת: ${fmt(currentZmanim.tzet)} | ` +
      `ערבית אחרונה: ${lastArvitFromSheet || '—'}`
    );
  } catch (e) {
    console.error('Zmanim fetch fail', e);
    setStatus('err', 'שגיאה בטעינת זמנים: ' + e.message);
    currentZmanim = null;
  }

  lastMinute = -1;
  tick();
}

function setStatus(type, msg) {
  const el = document.getElementById('simStatus');
  el.innerHTML = `<span class="${type}">${msg}</span>`;
}

/* ══════════════════════════════════════════════════════════
   SIMULATION CONTROLS
══════════════════════════════════════════════════════════ */
function applySimulation() {
  const d = document.getElementById('simDate').value;
  const t = document.getElementById('simTime').value;

  // Read zmanim overrides
  simZmanim = {
    minchaGedola: document.getElementById('ovMinchaGedola').value || null,
    sunset:       document.getElementById('ovSunset').value       || null,
    tzet:         document.getElementById('ovTzet').value         || null,
  };

  if (d && t) {
    simDateTime = new Date(`${d}T${t}`);
  }

  // Clear caches so data re-fetches for new date
  zmanimCache  = null;
  loadedDateKey = null;
  lastMinute   = -1;

  const now = getNow();
  fullRefresh(now, keyYMD(now));
}

function resetAll() {
  simDateTime  = null;
  simZmanim    = {};
  zmanimCache  = null;
  loadedDateKey = null;
  lastMinute   = -1;

  const now = new Date();
  document.getElementById('simDate').value = keyYMD(now);
  document.getElementById('simTime').value =
    String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  document.getElementById('ovMinchaGedola').value = '';
  document.getElementById('ovSunset').value = '';
  document.getElementById('ovTzet').value = '';

  fullRefresh(now, keyYMD(now));
}

/* ══════════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════════ */
(async function init() {
  // Loading placeholders
  document.getElementById('grid').innerHTML =
    `<section class="column"><div class="col-header"><h2 class="col-title">טוען...</h2></div>
     <div class="col-body"><ul class="times">
       ${Array(5).fill('<li class="time-item loading">--:--</li>').join('')}
     </ul></div></section>`.repeat(3);

  // Init sim panel with now
  const now = new Date();
  document.getElementById('simDate').value = keyYMD(now);
  document.getElementById('simTime').value =
    String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');

  // Load sheet (shacharit + last arvit)
  try {
    await loadSheetTimes();
  } catch (e) {
    console.warn('Sheet load fail', e);
    sheetSections      = [];
    lastArvitFromSheet = '22:00';
  }

  // First data load
  await fullRefresh(now, keyYMD(now));

  // Tick every second
  setInterval(tick, 1000);
})();
</script>
