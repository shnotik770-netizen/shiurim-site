<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>זמני היום</title>
<style>
  html, body { height: 100%; margin: 0; padding: 0; }
  body {
    background-color: #f4f0e6;
    font-family: 'David Libre', serif;
    color: #8b1538;
    direction: rtl;
  }

  .frame {
    width: 96vw;
    height: 100vh;
    background: linear-gradient(135deg, #f5f0e8 0%, #f2ede5 100%);
    border: 10px solid #d2691e;
    border-radius: 24px;
    box-shadow: 0 12px 32px rgba(210,105,30,0.6);
    padding: 2vh 2vw;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    user-select: none;
    margin: 0 auto;
  }

  header {
    background-color: #8b1538;
    padding: 2vh 2vw;
    border-radius: 18px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    text-align: center;
  }
  header h1 {
    margin: 0;
    font-size: calc(5vh * 2.2);
    color: #f0c674;
    letter-spacing: 0.3vw;
    text-shadow: 0 0 14px #f0c674bb;
    font-weight: 700;
  }
  header .date {
    margin-top: 0.6vh;
    font-size: 3.3vh;
    color: #ffffff;
    font-weight: 600;
  }

  /* הגריד */
  main {
    display: grid;
    margin-top: 5vh;
    gap: clamp(12px, 2vw, 24px);
    justify-items: center;
  }
  main.cols-4 { grid-template-columns: repeat(4, minmax(240px, 1fr)); }
  main.cols-3 { grid-template-columns: repeat(3, minmax(240px, 1fr)); }
  main.cols-2 { grid-template-columns: repeat(2, minmax(240px, 1fr)); }

  .item {
    width: 100%;
    max-width: 320px;
    height: 180px;
    background:#fff;
    border-radius:12px;
    box-shadow:0 4px 14px rgba(210,105,30,0.25);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:16px;
    box-sizing:border-box;
  }

  .time-label {
    flex: 2;
    display:flex;
    align-items:center;
    justify-content:center;
    width:100%;
    margin:0;
    text-align:center;
    font-size:38px;
    font-weight:bold;
  }

  .time {
    flex: 1;
    width:70%;
    height:40px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:6px;
    background:#f07a22;
    color:#000;
    font-weight:bold;
    font-size:38px;
  }

  html, body { overflow-x: hidden; }
</style>
</head>
<body>
  <div class="frame" role="main" aria-label="זמני היום עפולה">
    <header>
      <div class="header-content">
        <h1 id="title">זמני היום</h1>
        <div class="date" id="date">טוען...</div>
      </div>
    </header>

    <main id="zmanimList" aria-live="polite" aria-atomic="true" aria-relevant="all">
      <!-- פריטי זמן יתמלאו כאן -->
    </main>
  </div>

<script>
function sleep(ms){ return new Promise((resolve) => setTimeout(resolve, ms)); }

// allorigins.win (a free public proxy) and chabad.org's own bot protection both fail
// intermittently rather than consistently - a short retry smooths over transient blips.
async function fetchWithRetry(url, options, attempts=3, delayMs=1200){
  let lastError;
  for(let i=0; i<attempts; i++){
    try{
      const res = await fetch(url, options);
      if(!res.ok) throw new Error('HTTP '+res.status);
      return res;
    }catch(e){
      lastError = e;
      if(i < attempts-1) await sleep(delayMs);
    }
  }
  throw lastError;
}

/* === מקור נתוני תאריך (Hebcal - נותן גם שנה עברית, בניגוד לגיליון הקודם) === */
async function setHeaderDateFromHebcal(){
  const date = new Date();
  const weekday = date.toLocaleDateString('he-IL', { weekday:'long' });
  const greg = date.toLocaleDateString('he-IL', { year:'numeric', month:'long', day:'numeric' });
  try{
    const url = `https://www.hebcal.com/converter?cfg=json&gy=${date.getFullYear()}&gm=${date.getMonth()+1}&gd=${date.getDate()}&g2h=1`;
    const res = await fetchWithRetry(url, { cache:'no-store' });
    const data = await res.json();
    document.getElementById('date').textContent = `${weekday}, ${greg} · ${data.hebrew}`;
  }catch(err){
    console.error(err);
    document.getElementById('date').textContent = `${weekday}, ${greg}`;
  }
}

/* === מקור נתוני זמני היום (RSS) === */
const ZMANIM_RSS_URL = "https://he.chabad.org/tools/rss/zmanim.xml?locationId=803&locationType=1&bDef=0&before=30";

// Deploy google-apps-script/chabad-rss-proxy.gs and paste its /exec URL here to try it
// first - Google's own servers may have a different bot-protection reputation than free
// public proxies. Left empty, skips straight to the public proxies below.
const APPS_SCRIPT_PROXY_URL = "https://script.google.com/macros/s/AKfycbz3wnB2VY7KfFlE_b75Gw8T_gpHPyGLR5_xtNETcc6nN74Rywh2bn2tljewDqRrzfk_/exec";

// Tries each proxy in turn (2 attempts each) and returns the target URL's raw text from
// whichever one succeeds first - allorigins.win and chabad.org's bot protection both fail
// intermittently rather than consistently, so having more than one option matters.
async function fetchViaProxyChain(targetUrl){
  const attempts = [];
  if(APPS_SCRIPT_PROXY_URL){
    attempts.push({ name:'Apps Script', url: APPS_SCRIPT_PROXY_URL + '?url=' + encodeURIComponent(targetUrl), extract: (res) => res.text() });
  }
  attempts.push({ name:'allorigins.win', url: 'https://api.allorigins.win/get?url=' + encodeURIComponent(targetUrl), extract: async (res) => (await res.json()).contents });
  attempts.push({ name:'corsproxy.io', url: 'https://corsproxy.io/?' + encodeURIComponent(targetUrl), extract: (res) => res.text() });

  let lastError;
  for(const attempt of attempts){
    try{
      const res = await fetchWithRetry(attempt.url, { cache: 'no-store' }, 2, 1000);
      const text = await attempt.extract(res);
      console.info(`[proxy chain] succeeded via ${attempt.name} for ${targetUrl}`);
      return text;
    }catch(e){
      lastError = e;
      console.warn(`[proxy chain] ${attempt.name} failed:`, e.message);
    }
  }
  throw lastError || new Error('All proxy attempts failed');
}

function clearList(){ document.getElementById("zmanimList").innerHTML=""; }
function addItem(time,desc){
  const list=document.getElementById("zmanimList");
  const item=document.createElement("div");
  item.className="item";
  const descDiv=document.createElement("div");
  descDiv.className="time-label";
  descDiv.innerHTML=desc;
  const timeDiv=document.createElement("div");
  timeDiv.className="time";
  timeDiv.textContent=time;
  item.appendChild(descDiv);
  item.appendChild(timeDiv);
  list.appendChild(item);
}

function filterAndFormat(items){
  const filtered=[];
  const pushUnique=(time,desc)=>{ if(!filtered.some(x=>x.desc===desc)) filtered.push({time,desc}); };

  items.forEach(item=>{
    const title=item.querySelector("title")?.textContent||"";
    const time=item.querySelector("category")?.textContent||"";

    if (title.includes("עלות השחר")) {
      pushUnique(time,"עלות השחר");
    }
    else if (title.includes("משיכיר")) {
      pushUnique(time,"זמן טלית ותפילין");
    }
    else if (title.includes("זריחה")) {
      pushUnique(time,"זריחה");
    }
    else if (title.includes("קריאת שמע")) {
      pushUnique(time,"סוף זמן קריאת שמע");
    }
    // ❌ לא מציגים חצות הלילה
    else if (title.includes("חצות הלילה")) {
      // לא נכנס לרשימה
    }
    // ✅ רק חצות היום
    else if (title.includes("חצות") && !title.includes("הלילה")) {
      pushUnique(time,"חצות");
    }
    else if (title.includes("מנחה גדולה")) {
      pushUnique(time,"מנחה גדולה");
    }
    else if (title.includes("שקיעה")) {
      pushUnique(time,"שקיעת החמה");
    }
    else if (title.includes("צאת") || title.includes("יציאת")) {
      pushUnique(time,title.replace(/ - .*/,"").trim());
    }
  });
  return filtered;
}

async function fetchZmanim(){
  const xmlText=await fetchViaProxyChain(ZMANIM_RSS_URL);
  const parser=new DOMParser();
  const xml=parser.parseFromString(xmlText,"text/xml");
  const channel=xml.querySelector("channel");
  if(!channel) throw new Error("מבנה XML לא תקין");
  const items=channel.querySelectorAll("item");
  const filteredItems=filterAndFormat(items);
  return {items:filteredItems};
}

function adjustGridColumns(){
  const list=document.getElementById("zmanimList");
  const count=list.children.length;
  list.classList.remove("cols-4","cols-3","cols-2");
  if(count<=2){
    list.classList.add("cols-2");
  } else if(count===3){
    list.classList.add("cols-3");
  } else {
    list.classList.add("cols-4");
  }
}

function displayZmanim(zmanim){
  clearList();
  zmanim.items.forEach(({time,desc})=>addItem(time,desc));
  adjustGridColumns();
}

async function loadZmanimWithHourlyCheck(){
  const HOUR_MS=60*60*1000;
  const now=Date.now();
  const storedRaw=localStorage.getItem("zmanimData");
  if(storedRaw){
    try{
      const stored=JSON.parse(storedRaw);
      if(stored.timestamp&&(now-stored.timestamp<HOUR_MS)&&stored.zmanim&&stored.zmanim.items.length){
        displayZmanim(stored.zmanim);
        return;
      }
    }catch{}
  }
  try{
    const zmanim=await fetchZmanim();
    displayZmanim(zmanim);
    localStorage.setItem("zmanimData",JSON.stringify({timestamp:now,zmanim}));
  }catch(error){
    console.error("Error loading zmanim:",error);
  }
}

/* הפעלה ראשונית */
setHeaderDateFromHebcal();
loadZmanimWithHourlyCheck();
</script>
</body>
</html>
